<title>CircleHuB Avatar Maker</title>
<style>
:root {
  --bg:#0d1117; --panel:#161b22; --surface:#21262d;
  --border:#30363d; --cyan:#00f5ff; --orange:#ff7300;
  --text:#e6edf3; --muted:#8b949e; --selected:#ff7300;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Inter',sans-serif;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-title{font-size:16px;font-weight:700;color:var(--text);}
.hdr-btn{height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;
  color:var(--text);padding:0 12px;gap:5px;font-size:13px;font-weight:600;}
.hdr-btn.save{background:var(--orange);border-color:var(--orange);color:#fff;}
.hdr-btn:active{opacity:0.75;}

/* Preview area */
.preview-area{flex-shrink:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;padding:14px 14px 8px;}
.preview-stage{position:relative;width:180px;height:200px;border-radius:20px;overflow:hidden;
  background:#f8f4f0;box-shadow:0 8px 32px rgba(0,0,0,0.6);}
.preview-stage img.scene-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.preview-stage .avatar-img{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:120px;height:auto;image-rendering:auto;}
.preview-actions{display:flex;gap:8px;margin-top:10px;}
.preview-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;}
.preview-btn.active{background:rgba(255,115,0,0.15);border-color:var(--orange);color:var(--orange);}

/* Category tabs */
.cat-tabs{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;
  background:var(--panel);border-bottom:1px solid var(--border);}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--surface);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.cat-tab.active{background:var(--orange);border-color:var(--orange);color:#fff;}

/* Sub-tabs */
.sub-tabs{display:flex;gap:6px;padding:6px 12px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.sub-tabs::-webkit-scrollbar{display:none;}
.sub-tab{flex-shrink:0;padding:5px 14px;border-radius:16px;border:1.5px solid var(--border);
  background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;}
.sub-tab.active{border-color:var(--orange);color:var(--orange);background:rgba(255,115,0,0.08);}

/* Options grid */
.opts{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  padding:8px 10px 20px;align-content:start;}
.opt{background:var(--surface);border-radius:12px;border:2px solid var(--border);
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;transition:all 0.12s;overflow:hidden;position:relative;}
.opt:active{transform:scale(0.93);}
.opt.sel{border-color:var(--orange);background:rgba(255,115,0,0.1);}
.opt.sel::after{content:"✓";position:absolute;top:5px;right:7px;font-size:12px;
  font-weight:800;color:var(--orange);}
.opt-img{width:80%;height:75%;object-fit:contain;image-rendering:auto;}
.opt-img.scene{width:100%;height:80%;border-radius:8px;}
.opt-lbl{font-size:10px;color:var(--muted);font-weight:600;text-align:center;padding:0 4px;}
.opt.sel .opt-lbl{color:var(--orange);}
.no-icon{font-size:28px;color:var(--muted);}

/* Loading spinner */
.loading{display:flex;align-items:center;justify-content:center;height:60px;color:var(--muted);font-size:13px;}
</style>
</head>

// URL BUILDER
// ════════════════════════════════════════════════════════════════════
function buildUrl(overrides = {}) {
  const st = Object.assign({}, S, overrides);
  const params = new URLSearchParams();

  if (st.style === "adventurer" || st.style === "adventurer-neutral") {
    if (st.eyes)      params.set("eyes", st.eyes);
    if (st.eyebrows)  params.set("eyebrows", st.eyebrows);
    if (st.mouth)     params.set("mouth", st.mouth);
    if (st.hair)      params.set("hair", st.hair);
    if (st.earrings)  params.set("earrings", st.earrings);
    params.set("hairColor", st.hairColor);
    params.set("skinColor", st.skinColor);
    params.set("clothingColor", st.clothingColor);
    if (st.clothing)  params.set("clothing", st.clothing);
  } else if (st.style === "avataaars") {
    params.set("hairColor", st.hairColor);
    params.set("skinColor", st.skinColor);
  } else {
    params.set("seed", st.seed + st.hair + st.eyes);
  }

  params.set("size", "256");
  params.set("backgroundColor", st.backgroundColor || "transparent");
  const url = `${DB}/${st.style}/svg?seed=${encodeURIComponent(st.seed)}&${params.toString()}`;
  return url;
}

function updatePreview() {
  const img = document.getElementById("avatar-preview");
  img.src = buildUrl();
  img.onerror = () => {
    // fallback to simpler URL if params fail
    img.src = `${DB}/${S.style}/svg?seed=${encodeURIComponent(S.seed)}&size=256`;
  };

  // Scene
  const scene = SCENES.find(sc => sc.id === S.scene) || SCENES[0];
  const stage = document.getElementById("preview-stage");
  stage.style.background = scene.bg;
  const scImg = document.getElementById("scene-img");
  if (scene.img) {
    const blob = new Blob([scene.img], {type:"image/svg+xml"});
    scImg.src = URL.createObjectURL(blob);
    scImg.style.display = "block";
  } else {
    scImg.style.display = "none";
  }
}

function renderStyleGrid() {
  const grid = document.getElementById("opts-grid");
  grid.innerHTML = Object.entries(STYLES).map(([key, val]) => `
    <div class="opt${S.style === key ? " sel" : ""}" data-action="style:${key}">
      <img class="opt-img" src="${DB}/${key}/svg?seed=CircleHuB&size=80&backgroundColor=f8f4f0"
           loading="lazy" onerror="this.style.display='none'">
      <div class="opt-lbl">${val.label}</div>
    </div>`).join("");
}

  const items = stateKey === "earrings"
    ? [{ key: "", label: "None" }, ...variants.map(v => ({key:v, label:v.replace("variant","").replace(/^0+/,"")}))]
    : variants.map((v,i) => ({key:v, label: v.replace("variant","#").replace("long","Long ").replace("short","Short ").replace(/^0+/,"")}));

  grid.innerHTML = `<div class="loading" style="grid-column:1/-1;">Loading previews…</div>`;

  // Build grid after brief pause to show loading
  setTimeout(() => {
    grid.innerHTML = items.map(({key, label}) => {
      const isSelected = S[stateKey] === key;
      const previewUrl = key
        ? buildUrl({ [stateKey]: key, backgroundColor: "f8f4f0", size: 80 })
        : "";
      return `<div class="opt${isSelected ? " sel" : ""}" data-action="${stateKey}:${key}">
        ${key
          ? `<img class="opt-img" src="${previewUrl}" loading="lazy" onerror="this.parentNode.querySelector('.no-icon') && (this.style.display='none')">`
          : `<div class="no-icon">⊘</div>`}
        <div class="opt-lbl">${label || "None"}</div>
      </div>`;
    }).join("");
  }, 50);
}

function renderHairGrid() {
  renderVariantGrid("hair", ADV_HAIR, "hair");
}

function renderColorGrid(stateKey, colors) {
  const grid = document.getElementById("opts-grid");
  grid.innerHTML = colors.map(({label, val}) => `
    <div class="opt${S[stateKey] === val ? " sel" : ""}" data-action="${stateKey}:${val}">
      <div style="width:56px;height:56px;border-radius:50%;background:#${val};
        box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>
      <div class="opt-lbl">${label}</div>
    </div>`).join("");
}

function renderSceneGrid() {
  const grid = document.getElementById("opts-grid");
  grid.innerHTML = SCENES.map(sc => {
    const isSelected = S.scene === sc.id;
    const previewHtml = sc.img
      ? `<div style="width:100%;height:75%;border-radius:8px;overflow:hidden;background:${sc.bg};">
           <svg viewBox="0 0 200 200" style="width:100%;height:100%;">${sc.img.replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>
         </div>`
      : `<div style="width:100%;height:75%;border-radius:8px;background:#f8f4f0;display:flex;align-items:center;justify-content:center;font-size:24px;">🌿</div>`;
    return `<div class="opt${isSelected ? " sel" : ""}" data-action="scene:${sc.id}">
      ${previewHtml}
      <div class="opt-lbl">${sc.label}</div>
    </div>`;
  }).join("");
}

function renderSubTabs() {
  const cfg = CAT_CONFIG[activeCat];
  const subEl = document.getElementById("sub-tabs");
  if (!cfg.subs.length) { subEl.innerHTML = ""; return; }
  if (!activeSub) activeSub = cfg.subs[0];
  subEl.innerHTML = cfg.subs.map(s => `
    <div class="sub-tab${activeSub === s ? " active" : ""}" data-sub="${s}">${s}</div>`).join("");
}

function renderAll() {
  renderSubTabs();
  CAT_CONFIG[activeCat].render(activeSub);
}

// ════════════════════════════════════════════════════════════════════
// EVENTS
// ════════════════════════════════════════════════════════════════════
document.getElementById("cat-tabs").addEventListener("click", (e) => {
  const tab = e.target.closest("[data-cat]");
  if (!tab) return;
  activeCat = tab.dataset.cat;
  activeSub = "";
  document.querySelectorAll(".cat-tab").forEach(t => t.classList.toggle("active", t.dataset.cat === activeCat));
  renderAll();
});

document.getElementById("sub-tabs").addEventListener("click", (e) => {
  const tab = e.target.closest("[data-sub]");
  if (!tab) return;
  activeSub = tab.dataset.sub;
  document.querySelectorAll(".sub-tab").forEach(t => t.classList.toggle("active", t.dataset.sub === activeSub));
  CAT_CONFIG[activeCat].render(activeSub);
});

document.getElementById("opts-grid").addEventListener("click", (e) => {
  const opt = e.target.closest("[data-action]");
  if (!opt) return;
  const [key, val] = opt.dataset.action.split(":");
  S[key] = val;
  if (key === "style") {
    // Reset feature params when switching style
    S.seed = "CircleHuB" + Math.random().toString(36).slice(2,6);
  }
  updatePreview();
  // Re-render current grid to show selection
  document.querySelectorAll(`[data-action^="${key}:"]`).forEach(el => {
    el.classList.toggle("sel", el.dataset.action === opt.dataset.action);
    const after = el.querySelector(".opt-lbl");
    if (after) after.style.color = el.classList.contains("sel") ? "var(--orange)" : "";
  });
  // Update checkmark
  document.querySelectorAll(`[data-action^="${key}:"]`).forEach(el => {
    el.classList.toggle("sel", el.dataset.action === `${key}:${val}`);
  });
});

// Randomize
document.getElementById("random-btn").addEventListener("click", () => {
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
  S.eyes = pick(ADV_EYES);
  S.eyebrows = pick(ADV_BROWS);
  S.mouth = pick(ADV_MOUTH);
  S.hair = pick(ADV_HAIR);
  S.hairColor = HAIR_COLORS[Math.floor(Math.random()*HAIR_COLORS.length)].val;
  S.skinColor = SKIN_COLORS[Math.floor(Math.random()*SKIN_COLORS.length)].val;
  S.clothingColor = CLOTH_COLORS[Math.floor(Math.random()*CLOTH_COLORS.length)].val;
  S.clothing = pick(ADV_CLOTHING);
  S.scene = SCENES[Math.floor(Math.random()*SCENES.length)].id;
  S.seed = "rnd" + Date.now();
  updatePreview();
  renderAll();
});

// Preview mode buttons
["prev-chibi","prev-circle","prev-pixel"].forEach(id => {
  document.getElementById(id).addEventListener("click", () => {
    document.querySelectorAll(".preview-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    const mode = id.replace("prev-","");
    if (mode === "chibi") {
      S.style = "adventurer";
    } else if (mode === "circle") {
      S.style = "big-smile";
    } else {
      S.style = "pixel";
    }
    updatePreview();
    if (activeCat === "style") renderStyleGrid();
  });
});

// Save
document.getElementById("save-btn").addEventListener("click", () => {
  const avatarUrl = buildUrl();
  const savedData = { url: avatarUrl, state: JSON.stringify(S) };
  // Post message to parent (CircleHuB main app)
  if (window.parent !== window) {
    window.parent.postMessage({ type: "avatarSaved", avatarUrl, avatarState: JSON.stringify(S) }, "*");
  } else {
    // Standalone: download
    const a = document.createElement("a");
    a.href = avatarUrl; a.target="_blank";
    a.click();
    alert("Avatar URL copied! Integrate with CircleHuB to save directly.");
  }
});

// Back
document.getElementById("back-btn").addEventListener("click", () => {
  if (window.parent !== window) {
    window.parent.postMessage({ type: "avatarClosed" }, "*");
  } else history.back();
});

// ════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════
updatePreview();
renderAll();
</script>
</body>
</html>
