<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>mig33 Ultimate</title>
<style>
/* --- mig33 AUTHENTIC UI --- */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Tahoma, Geneva, Verdana, sans-serif; background: #000; height: 100vh; overflow: hidden; }
.app { width: 100%; height: 100dvh; max-width: 430px; margin: 0 auto; background: #f4f4f4; display: flex; flex-direction: column; position: relative; }

/* Tabstrip (The iconic Blue icon bar) */
.tabstrip { display: flex; background: #2a72a8; border-bottom: 2px solid #15466e; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
.tabstrip::-webkit-scrollbar { display: none; }
.tabstrip .tab-icon { width: 44px; height: 38px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #15466e; cursor: pointer; color: #fff; font-size: 18px; flex-shrink: 0; position: relative; }
.tabstrip .tab-icon.active { background: #eef4f8; color: #15466e; }
.unread-dot { position: absolute; top: 5px; right: 5px; width: 8px; height: 8px; background: #f5d51c; border-radius: 50%; display: none; border: 1px solid #000; }

/* Top Bar (Orange Presence Bar) */
.topbar { background: linear-gradient(to bottom, #f0a13a, #d4730a); padding: 6px 10px; display: flex; align-items: center; gap: 8px; color: #fff; border-bottom: 1px solid #8a4f06; }
.presence-dot { width: 11px; height: 11px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.3); background: #4ec73f; }
.who { flex: 1; overflow: hidden; line-height: 1.1; }
.who b { font-size: 13.5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.who small { font-size: 10px; opacity: 0.9; }
.cr-chip { background: rgba(0,0,0,0.25); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }

/* Content & Section Strips */
.content { flex: 1; overflow-y: auto; background: #fff; }
.section-strip { background: #d4d4d4; padding: 4px 10px; font-size: 11px; font-weight: bold; color: #1c2733; border-bottom: 1px solid #b8b8b8; text-transform: uppercase; }
.list-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-bottom: 1px dashed #ccc; cursor: pointer; }
.list-row:active { background: #eaf2fa; }

/* Chat Elements */
.msg { padding: 5px 10px; border-bottom: 1px dashed #eee; font-size: 12.5px; line-height: 1.4; }
.msg.bot { background: #f0f4f7; color: #1c3a55; border-left: 3px solid #2a72a8; font-family: 'Courier New', Courier, monospace; }
.sender { font-weight: bold; margin-right: 4px; }
.av-head { width: 22px; height: 22px; vertical-align: middle; background: #eee; border: 1px solid #ccc; margin-right: 4px; image-rendering: pixelated; }

/* Avatar Gallery UI */
.av-gallery { position: absolute; inset: 0; background: #fff; z-index: 200; display: none; flex-direction: column; }
.av-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; overflow-y: auto; }
.av-item { text-align: center; cursor: pointer; padding: 5px; border: 1px solid #eee; }
.av-item:hover { background: #eaf2fa; border-color: #2a72a8; }
.av-item img { width: 32px; height: 32px; image-rendering: pixelated; }

/* Input Bar */
.input-bar { display: flex; padding: 6px; background: #d8dadb; border-top: 1px solid #bbb; gap: 4px; }
.input-bar input { flex: 1; padding: 7px; border: 1px solid #999; border-radius: 2px; font-size: 13px; }
.input-bar button { padding: 7px 12px; background: linear-gradient(to bottom, #ffd87a, #d97f10); border: 1px solid #7a4f0a; font-weight: bold; border-radius: 2px; cursor: pointer; }

/* Generic Styles */
.view { display: none; flex-direction: column; height: 100%; }
.active-view { display: flex; }
</style>
</head>
<body>

<div class="app">
    <!-- AUTH VIEW -->
    <div id="view-auth" class="view active-view">
        <div style="background:#2a72a8; padding:50px 20px; text-align:center; color:#fff;">
            <h1 style="font-style:italic; font-size:45px; letter-spacing:-2px;">mig<span style="color:#f0a13a">33</span></h1>
            <p style="font-size:11px; opacity:0.8;">High Security Clone</p>
        </div>
        <div style="padding:20px; background:#d8dadb; flex:1;">
            <input type="email" id="auth-email" placeholder="Email (Gmail Dot-Trick Blocked)" style="width:100%; padding:12px; margin-bottom:8px; border:1px solid #999;">
            <input type="password" id="auth-pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #999;">
            <button onclick="login()" style="width:100%; padding:12px; margin-bottom:20px;">Login</button>
            <div style="text-align:center; margin-bottom:20px; font-size:11px; color:#666;">--- REGISTER NEW ID ---</div>
            <input type="text" id="reg-user" placeholder="Username" style="width:100%; padding:12px; margin-bottom:8px; border:1px solid #999;">
            <button onclick="register()" style="width:100%; padding:12px; background:#2a72a8; color:#fff;">Create mig33 ID</button>
        </div>
    </div>

    <!-- AVATAR GALLERY VIEW -->
    <div id="view-avatars" class="av-gallery">
        <div class="topbar">
            <span onclick="closeAvatars()" style="cursor:pointer; font-weight:bold;">✕</span>
            <div class="who"><b>Select mig33 Head</b></div>
        </div>
        <div class="section-strip">Classic Categories</div>
        <div class="av-grid" id="av-grid"></div>
    </div>

    <!-- MAIN VIEW -->
    <div id="view-main" class="view">
        <div class="tabstrip">
            <div class="tab-icon active" onclick="showSec('friends')">👥</div>
            <div class="tab-icon" onclick="showSec('rooms')">💬</div>
            <div class="tab-icon" onclick="openAvatars()">👤</div>
            <div id="dynamic-tabs" style="display:flex;"></div>
        </div>
        <div class="topbar">
            <div class="presence-dot"></div>
            <div class="who" id="my-info"></div>
            <div class="cr-chip" id="my-cr">💰 0</div>
        </div>
        
        <div id="sec-friends" class="sec content">
            <div class="section-strip">Friends (Click to PM)</div>
            <div id="friends-list"></div>
        </div>

        <div id="sec-rooms" class="sec content" style="display:none;">
            <div class="section-strip">Official Arenas</div>
            <div id="official-rooms"></div>
        </div>

        <div id="sec-chat" class="sec" style="display:none; flex:1; flex-direction:column;">
            <div id="chat-msgs" style="flex:1; overflow-y:auto; background:#fff;"></div>
            <div id="game-status" style="display:none; background:#1c3a55; color:#ffcf6e; padding:5px; font-size:11px; text-align:center; font-family:monospace; border-top:1px solid #000;"></div>
            <div class="input-bar">
                <input type="text" id="chat-input" placeholder="Message or !b 1-6...">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyBL4fxOpQcu0otOtCzhq95X-uULIHrTP20",
  authDomain: "buzzr-987ea.firebaseapp.com",
  databaseURL: "https://buzzr-987ea-default-rtdb.firebaseio.com",
  projectId: "buzzr-987ea",
  storageBucket: "buzzr-987ea.firebasestorage.app",
  messagingSenderId: "557198372950",
  appId: "1:557198372950:web:ab3415c2fe09cbf7d34bf7"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// --- CONSTANTS ---
// We use "Pixel Art" heads with specific seeds that look like the classic Boys/Girls/Fun categories.
const MIG_HEADS = [
    ...Array.from({length: 10}, (_, i) => ({cat: 'Boys', url: `https://api.dicebear.com/7.x/pixel-art/svg?seed=B${i}&size=64&backgroundColor=b6e3f4`})),
    ...Array.from({length: 10}, (_, i) => ({cat: 'Girls', url: `https://api.dicebear.com/7.x/pixel-art/svg?seed=G${i}&size=64&backgroundColor=ffdfbf`})),
    ...Array.from({length: 5}, (_, i) => ({cat: 'Fun', url: `https://api.dicebear.com/7.x/pixel-art/svg?seed=F${i}&size=64&backgroundColor=c0aede`}))
];

const ROLES = {
    member: { rank: 0, color: '#1a52a8', label: 'Member' },
    submerchant: { rank: 1, color: '#e75fb3', label: 'Sub-Merchant' },
    merchant: { rank: 1, color: '#9b59b6', label: 'Merchant' },
    mentor: { rank: 2, color: '#e63946', label: 'Mentor' },
    globaladmin: { rank: 4, color: '#e8820c', label: 'Admin' },
    owner: { rank: 5, color: '#e8820c', label: 'Owner' }
};

let me = null;
let curTab = null;
let openTabs = {};

// --- SECURITY MIDDLEWARE ---

function normalizeEmail(email) {
    let [user, domain] = email.toLowerCase().trim().split('@');
    if (domain === 'gmail.com') {
        user = user.split('+')[0].replace(/\./g, ''); 
    }
    return user + '@' + domain;
}

function getDeviceFingerprint() {
    let id = localStorage.getItem('mig_secure_id');
    if (!id) {
        id = 'd_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('mig_secure_id', id);
    }
    return id;
}

// --- AUTH ---

function login() { 
    auth.signInWithEmailAndPassword(document.getElementById('auth-email').value, document.getElementById('auth-pass').value).catch(e => alert(e.message)); 
}

function register() {
    const user = document.getElementById('reg-user').value.trim();
    const emailRaw = document.getElementById('auth-email').value.trim();
    const pass = document.getElementById('auth-pass').value;
    const fp = getDeviceFingerprint();

    if (!user || !emailRaw) return alert("Fill all fields");

    // Block Temp Mails
    if (["yopmail", "tempmail", "mailinator"].some(d => emailRaw.includes(d))) return alert("Temp-mails are banned.");

    const email = normalizeEmail(emailRaw);

    db.ref('devices/' + fp).once('value', s => {
        if ((s.val() || 0) >= 2) return alert("Security: Max 2 accounts per device.");

        auth.createUserWithEmailAndPassword(email, pass).then(res => {
            db.ref('users').once('value', uSnap => {
                const isOwner = !uSnap.exists();
                db.ref('users/' + res.user.uid).set({
                    username: user, credits: isOwner ? 100000 : 500, xp: 0, 
                    role: isOwner ? 'owner' : 'member', av: 0, fp
                });
                db.ref('usernames/' + user.toLowerCase()).set(res.user.uid);
                db.ref('devices/' + fp).set((s.val() || 0) + 1);
            });
        }).catch(e => alert("Registration error (Email may already be tied to another ID)."));
    });
}

auth.onAuthStateChanged(user => {
    if (user) {
        db.ref('users/' + user.uid).on('value', snap => {
            me = snap.val(); me.uid = user.uid;
            updateUI();
        });
        showSec('friends');
        document.getElementById('view-auth').classList.remove('active-view');
        document.getElementById('view-main').classList.add('active-view');
        loadOfficialRooms();
        refreshFriendsList();
    } else {
        document.getElementById('view-main').classList.remove('active-view');
        document.getElementById('view-auth').classList.add('active-view');
    }
});

function updateUI() {
    const lvl = Math.floor(me.xp / 100) + 1;
    document.getElementById('my-info').innerHTML = `
        <b style="color:${ROLES[me.role].color}">${me.username}</b>
        <br><small>Level ${lvl} ${ROLES[me.role].label}</small>`;
    document.getElementById('my-cr').innerText = "💰 " + (me.credits || 0);
}

// --- AVATAR SYSTEM ---

function openAvatars() {
    const grid = document.getElementById('av-grid');
    grid.innerHTML = MIG_HEADS.map((h, i) => `
        <div class="av-item" onclick="setAvatar(${i})">
            <img src="${h.url}">
            <div style="font-size:8px; margin-top:3px;">${h.cat}</div>
        </div>
    `).join('');
    document.getElementById('view-avatars').style.display = 'flex';
}
function setAvatar(i) {
    db.ref('users/'+me.uid+'/av').set(i);
    closeAvatars();
}
function closeAvatars() { document.getElementById('view-avatars').style.display = 'none'; }

// --- REAL CRICKET ENGINE (Ball-by-Ball) ---

function autoStart(rid) {
    const waitId = Date.now();
    db.ref(`rooms/${rid}/game`).update({ waitStartedAt: waitId });
    setTimeout(() => {
        db.ref(`rooms/${rid}/game`).once('value', s => {
            if(s.val()?.waitStartedAt === waitId) {
                const startTime = Date.now();
                db.ref(`rooms/${rid}/game`).update({ 
                    status: 'active', 
                    waitStartedAt: null, 
                    roundTime: startTime,
                    botBowl: Math.floor(Math.random() * 6) + 1 
                });
                postBotMsg(rid, "🏏 THE BOWL IS IN! Type !b 1 to 6 now! (20s)");
                setTimeout(() => resolveCricket(rid, startTime), 20000);
            }
        });
    }, 10000);
}

function resolveCricket(rid, time) {
    db.ref(`rooms/${rid}/game`).once('value', snap => {
        const g = snap.val();
        if(!g || g.roundTime !== time) return;
        
        const players = g.players || {};
        const bowl = g.botBowl;
        let logs = [`Umpire: Bot bowled a ${bowl}!`];

        Object.keys(players).forEach(uid => {
            const p = players[uid];
            if(p.status === 'batting') {
                const bat = p.move || Math.floor(Math.random() * 6) + 1;
                if (bat === bowl) {
                    db.ref(`rooms/${rid}/game/players/${uid}/status`).set('out');
                    logs.push(`🛑 ${p.username} is OUT! (Bat: ${bat} == Bowl: ${bowl}). Score: ${p.score}`);
                } else {
                    const newScore = (p.score || 0) + bat;
                    db.ref(`rooms/${rid}/game/players/${uid}`).update({ score: newScore, move: null });
                    logs.push(`🏏 ${p.username} hits a ${bat}! (Total: ${newScore})`);
                }
            }
        });

        postBotMsg(rid, logs.join(" | "));
        
        // Match continues if any "batting" players remain
        db.ref(`rooms/${rid}/game/players`).once('value', ps => {
            const data = ps.val() || {};
            const stillBatting = Object.values(data).filter(p => p.status === 'batting');
            
            if(stillBatting.length === 0) {
                const rankings = Object.values(data).sort((a,b) => b.score - a.score);
                if(rankings[0]) {
                    postBotMsg(rid, `🏆 MATCH FINISHED! Winner: ${rankings[0].username} with ${rankings[0].score} runs!`);
                    db.ref(`users/${Object.keys(data).find(k => data[k].username === rankings[0].username)}/credits`).set(firebase.database.ServerValue.increment(100));
                }
                db.ref(`rooms/${rid}/game`).set({ status: 'idle', players: null });
            } else {
                db.ref(`rooms/${rid}/game`).update({ status: 'idle' }); // Trigger auto-start for next ball
            }
        });
    });
}

// --- CHAT & TABS ---

function openChat(id, name, type) {
    if (!openTabs[id]) {
        openTabs[id] = { id, name, type };
        const path = type === 'room' ? `rooms/${id}/messages` : `pms/${id}/messages`;
        db.ref(path).limitToLast(1).on('child_added', snap => {
            if(curTab?.id !== id) openTabs[id].unread = true;
            renderMsg(id, snap.val());
            updateTabs();
        });

        if(type === 'room') {
            db.ref(`rooms/${id}/game`).on('value', snap => {
                const g = snap.val();
                if(curTab?.id === id) renderGameUI(g);
                if(g?.status === 'idle' && Object.keys(g.players || {}).length >= 2 && !g.waitStartedAt) autoStart(id);
            });
        }
    }
    curTab = openTabs[id];
    curTab.unread = false;
    showSec('chat');
    updateTabs();
    loadHistory(id);
}

function sendMsg() {
    const inp = document.getElementById('chat-input');
    const val = inp.value.trim(); if(!val || !curTab) return;
    inp.value = "";

    // Cricket In-Chat Move Shortcut
    if(val.startsWith("!b")) {
        const m = parseInt(val.split(" ")[1]);
        if(m >= 1 && m <= 6) return db.ref(`rooms/${curTab.id}/game/players/${me.uid}/move`).set(m);
    }
    // Join Game Shortcut
    if(val === "!j") return db.ref(`rooms/${curTab.id}/game/players/${me.uid}`).set({ username: me.username, status: 'batting', score: 0 });

    const path = curTab.type === 'room' ? `rooms/${curTab.id}/messages` : `pms/${curTab.id}/messages`;
    db.ref(path).push({ uid: me.uid, username: me.username, text: val, av: me.av, color: ROLES[me.role].color, timestamp: Date.now() });
    db.ref('users/'+me.uid).update({ xp: firebase.database.ServerValue.increment(2), credits: firebase.database.ServerValue.increment(1) });
}

function renderMsg(tid, msg) {
    if (curTab?.id !== tid) return;
    const cont = document.getElementById('chat-msgs');
    const div = document.createElement('div');
    div.className = "msg " + (msg.type || "");
    const head = msg.uid !== 'BOT' ? `<img src="${MIG_HEADS[msg.av].url}" class="av-head">` : "";
    div.innerHTML = `${head}<span class="sender" style="color:${msg.color || '#1a52a8'}">${msg.username}:</span> ${msg.text}`;
    cont.appendChild(div);
    cont.scrollTop = cont.scrollHeight;
}

function updateTabs() {
    let h = "";
    Object.keys(openTabs).forEach(id => {
        const t = openTabs[id];
        const act = curTab?.id === id ? 'active' : '';
        const unr = t.unread ? '<div class="unread-dot" style="display:block;"></div>' : '';
        h += `<div class="tab-icon ${act}" onclick="openChat('${t.id}','${t.name}','${t.type}')">${t.type==='pm'?'👤':'💬'}${unr}</div>`;
    });
    document.getElementById('dynamic-tabs').innerHTML = h;
}

// --- UTILS ---
function showSec(s) {
    document.querySelectorAll('.sec').forEach(el => el.style.display = 'none');
    document.getElementById('sec-' + s).style.display = s === 'chat' ? 'flex' : 'block';
}
function loadOfficialRooms() {
    const rs = [{id:'newbies', n:'Newbies'}, {id:'game-cricket', n:'Cricket Arena'}];
    document.getElementById('official-rooms').innerHTML = rs.map(r => `<div class="list-row" onclick="openChat('${r.id}','${r.n}','room')"><b>${r.n}</b></div>`).join('');
}
function refreshFriendsList() {
    db.ref('users').limitToFirst(20).once('value', snap => {
        let h = "";
        snap.forEach(u => {
            if(u.key !== me.uid) h += `<div class="list-row" onclick="openChat('${u.key}','${u.val().username}','pm')"><img src="${MIG_HEADS[u.val().av].url}" class="av-head"><b>${u.val().username}</b></div>`;
        });
        document.getElementById('friends-list').innerHTML = h;
    });
}
function loadHistory(id) {
    document.getElementById('chat-msgs').innerHTML = "";
    const path = openTabs[id].type === 'room' ? `rooms/${id}/messages` : `pms/${id}/messages`;
    db.ref(path).limitToLast(25).once('value', snap => snap.forEach(m => renderMsg(id, m.val())));
}
function renderGameUI(g) {
    const bar = document.getElementById('game-status');
    if(!g) return bar.style.display='none';
    bar.style.display = 'block';
    bar.innerText = `🏏 CRICKET BALL: ${g.status} | LIVE PLAYERS: ${Object.keys(g.players||{}).length}`;
}
function postBotMsg(rid, t) { db.ref(`rooms/${rid}/messages`).push({ uid:'BOT', username:'mig Bot', text:t, type:'bot' }); }
function toggleEmojiModal() {
    const m = document.getElementById('emoji-modal');
    m.innerHTML = EMOJIS.map(e => `<div class="grid-item" onclick="appEmoji('${e}')">${e}</div>`).join('');
    m.style.display = m.style.display === 'grid' ? 'none' : 'grid';
}
function appEmoji(e) { document.getElementById('chat-input').value += e; document.getElementById('emoji-modal').style.display = 'none'; }
</script>
</body>
</html>
