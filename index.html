<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>mig33 Ultimate</title>
<style>
/* ---- All original styles preserved + new ones for PMs and LevelUp ---- */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow: hidden; }
body { font-family: Tahoma, Geneva, Verdana, Arial, sans-serif; background: #000; }
.app { width: 100%; height: 100vh; height: 100dvh; margin: 0 auto; background: #f4f4f4; display: flex; flex-direction: column; position: relative; overflow: hidden; }
@media (min-width: 600px) { .app { max-width: 430px; box-shadow: 0 0 50px rgba(0,0,0,0.6); border-left: 1px solid #000; border-right: 1px solid #000; } }

/* TAB STRIP */
.tabstrip { display: flex; align-items: stretch; background: #2a72a8; border-bottom: 2px solid #15466e; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
.tabstrip::-webkit-scrollbar { display: none; }
.tabstrip .tab-current { flex-shrink: 0; padding: 7px 10px; font-size: 12px; font-weight: bold; color: #15466e; background: #eef4f8; border-right: 1px solid #15466e; display: flex; align-items: center; gap: 4px; white-space: nowrap; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
.tabstrip .tab-icon { flex-shrink: 0; width: 34px; display: flex; align-items: center; justify-content: center; font-size: 15px; background: linear-gradient(to bottom, #4f97cf, #2a72a8); border-right: 1px solid #15466e; cursor: pointer; color: #fff; }

/* TOP BAR */
.topbar { background: linear-gradient(to bottom, #f0a13a 0%, #e0820f 55%, #d4730a 100%); border-bottom: 1px solid #8a4f06; padding: 8px 10px; display: flex; align-items: center; gap: 8px; color: #fff; flex-shrink: 0; }
.topbar .presence-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #1f6e15; background: #4ec73f; }
.topbar .who { flex: 1; min-width: 0; }
.topbar .who .uname { font-weight: bold; font-size: 14px; display:block; }
.topbar .cr-coin { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: bold; }

/* CONTENT & MESSAGES */
.content { flex: 1; overflow-y: auto; background: #fff; }
.padded { padding: 12px; }
.section-strip { background: #d4d4d4; border-top: 1px solid #b8b8b8; border-bottom: 1px solid #b8b8b8; font-size: 12px; font-weight: bold; padding: 5px 10px; }
.list-row { display: flex; align-items: center; gap: 8px; padding: 10px; border-bottom: 1px dashed #ccc; cursor: pointer; }
.list-row:active { background: #eaf2fa; }
.msg { padding: 6px 10px; border-bottom: 1px dashed #eee; font-size: 13px; }
.msg.private { background: #fff9e6; border-left: 3px solid #f0a13a; }
.msg .sender { font-weight: bold; margin-right: 5px; }

/* INPUT */
.chat-input-bar { display: flex; gap: 5px; padding: 8px; background: #d8dadb; border-top: 1px solid #bbb; }
.chat-input-bar input { flex: 1; padding: 8px; border: 1px solid #999; border-radius: 3px; }
.chat-input-bar button { padding: 0 15px; background: linear-gradient(to bottom, #ffd87a, #d97f10); border: 1px solid #7a4f0a; font-weight: bold; border-radius: 3px; }

/* LEVEL UP POPUP */
#level-up-popup {
    position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
    background: #1c3a55; color: #fff; padding: 20px; border-radius: 10px;
    border: 3px solid #ffcf6e; text-align: center; z-index: 1000;
    display: none; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes popIn { from { transform: translateX(-50%) scale(0.5); opacity: 0; } to { transform: translateX(-50%) scale(1); opacity: 1; } }

.view { display: none; height: 100%; flex-direction: column; }
.view.active { display: flex; }
</style>
</head>
<body>

<div class="app">
    
    <!-- LEVEL UP TOAST -->
    <div id="level-up-popup">
        <h2 style="color: #ffcf6e;">✨ LEVEL UP! ✨</h2>
        <p id="level-up-text">You reached Level 2</p>
    </div>

    <!-- Auth -->
    <div id="view-auth" class="view active">
        <div class="padded" style="margin-top: 50px; text-align: center;">
            <h1 style="color: #2a72a8; font-style: italic;">mig<span style="color: #e0820f;">33</span></h1>
            <div style="background: #d8dadb; padding: 20px; border-radius: 5px; margin-top: 20px;">
                <input type="email" id="login-email" placeholder="Email"><br>
                <input type="password" id="login-password" placeholder="Password"><br>
                <button onclick="login()" style="width: 100%; margin-top: 10px;">Login</button>
                <p style="font-size: 11px; margin-top: 15px;">New? Register below</p>
                <input type="text" id="reg-user" placeholder="Username"><br>
                <button onclick="register()" style="width: 100%; background: #2a72a8; color: #fff; border-color: #15466e;">Register New Account</button>
            </div>
        </div>
    </div>

    <!-- Lobby / Friends -->
    <div id="view-rooms" class="view">
        <div class="tabstrip">
            <div class="tab-current">👥 Friends</div>
            <div class="tab-icon" onclick="showRooms()">💬</div>
        </div>
        <div class="topbar">
            <div class="presence-dot"></div>
            <div class="who" id="user-card-lobby"></div>
            <div class="cr-coin" id="user-cr-lobby">💰 0</div>
        </div>
        <div class="content">
            <div class="section-strip">My Friends (Click to Chat)</div>
            <div id="friends-list"></div>
        </div>
    </div>

    <!-- Room List -->
    <div id="view-chatrooms" class="view">
        <div class="tabstrip">
            <div class="tab-icon" onclick="showFriends()">👥</div>
            <div class="tab-current">💬 Chat Rooms</div>
        </div>
        <div class="content">
            <div id="room-list"></div>
        </div>
    </div>

    <!-- Chat View -->
    <div id="view-chat" class="view">
        <div class="tabstrip">
            <div class="tab-icon" onclick="showFriends()">👥</div>
            <div class="tab-icon" onclick="showRooms()">💬</div>
            <div id="dynamic-tabs" style="display:flex;"></div>
            <div class="tab-current" id="active-tab-name">Chat</div>
        </div>
        <div class="topbar">
            <div class="who"><span class="uname" id="chat-header-name">Room</span></div>
            <div class="cr-coin" id="user-cr-chat">💰 0</div>
            <div style="font-weight: bold; cursor: pointer;" onclick="closeCurrentTab()">✕</div>
        </div>
        <div class="content" id="chat-messages"></div>
        <div id="game-ui" style="display:none; background: #1c3a55; padding: 5px; color: #ffcf6e; font-size: 11px; text-align: center;"></div>
        <div class="chat-input-bar">
            <input type="text" id="chat-input" placeholder="Type here...">
            <button onclick="sendChatMessage()">Send</button>
        </div>
    </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyBL4fxOpQcu0otOtCzhq95X-uULIHrTP20",
  authDomain: "buzzr-987ea.firebaseapp.com",
  databaseURL: "https://buzzr-987ea-default-rtdb.firebaseio.com",
  projectId: "buzzr-987ea",
  storageBucket: "buzzr-987ea.firebasestorage.app",
  messagingSenderId: "557198372950",
  appId: "1:557198372950:web:ab3415c2fe09cbf7d34bf7"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// --- GLOBALS ---
let userProfile = null;
let activeTab = null; // { id, name, type: 'room'|'pm' }
let openTabs = {};
let lastKnownLevel = 1;

const OFFICIAL_ROOMS = ["newbies", "game-lowcard", "game-dice", "game-cricket"];
const ROLE_RANK = { member: 0, mentor: 2, globaladmin: 4, owner: 5 };

// --- UTILS ---
function getLevel(xp) { return Math.floor((xp || 0) / 50) + 1; }
function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// --- AUTH ---
function login() {
    auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-password').value);
}
function register() {
    const user = document.getElementById('reg-user').value.trim();
    auth.createUserWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-password').value)
    .then(res => {
        db.ref('users/' + res.user.uid).set({ username: user, credits: 200, xp: 0, role: 'member' });
        db.ref('usernames/' + user.toLowerCase()).set(res.user.uid);
    });
}

auth.onAuthStateChanged(user => {
    if (user) {
        db.ref('users/' + user.uid).on('value', snap => {
            userProfile = snap.val();
            const currentLevel = getLevel(userProfile.xp);
            
            // Level Up Check
            if (currentLevel > lastKnownLevel && lastKnownLevel !== 0) {
                triggerLevelUp(currentLevel);
            }
            lastKnownLevel = currentLevel;

            updateUI();
            if (document.getElementById('view-auth').classList.contains('active')) showFriends();
        });
    } else {
        showView('view-auth');
    }
});

function triggerLevelUp(lvl) {
    const popup = document.getElementById('level-up-popup');
    document.getElementById('level-up-text').innerText = "You reached Level " + lvl;
    popup.style.display = "block";
    setTimeout(() => { popup.style.display = "none"; }, 4000);
}

function updateUI() {
    if (!userProfile) return;
    const card = `<b>${userProfile.username}</b> <span class="lvl-tag">Lv.${getLevel(userProfile.xp)}</span>`;
    document.getElementById('user-card-lobby').innerHTML = card;
    document.getElementById('user-cr-lobby').innerText = "💰 " + userProfile.credits;
    document.getElementById('user-cr-chat').innerText = "💰 " + userProfile.credits;
}

// --- ROOMS & FRIENDS ---
function showFriends() {
    showView('view-rooms');
    db.ref('users').limitToFirst(20).once('value', snap => {
        let html = "";
        snap.forEach(u => {
            if (u.key === auth.currentUser.uid) return;
            html += `<div class="list-row" onclick="startPM('${u.key}', '${u.val().username}')">
                        <div class="presence-dot"></div>
                        <div class="rowtext"><b>${u.val().username}</b> <span style="font-size:10px; color:#666;">(Click to Private Message)</span></div>
                    </div>`;
        });
        document.getElementById('friends-list').innerHTML = html;
    });
}

function showRooms() {
    showView('view-chatrooms');
    const rooms = [
        {id: 'newbies', name: 'Newbies Room'},
        {id: 'game-lowcard', name: 'LowCard Arena'},
        {id: 'game-dice', name: 'Dice Arena'}
    ];
    let html = "";
    rooms.forEach(r => {
        html += `<div class="list-row" onclick="joinRoom('${r.id}', '${r.name}')">
                    <div class="rowtext"><b>${r.name}</b></div>
                </div>`;
    });
    document.getElementById('room-list').innerHTML = html;
}

// --- CHAT SYSTEM (ROOMS & PMs) ---
function joinRoom(id, name) {
    setupTab(id, name, 'room');
}

function startPM(targetUid, targetName) {
    // Unique ID for the PM conversation
    const pmId = auth.currentUser.uid < targetUid ? 
                 auth.currentUser.uid + "_" + targetUid : 
                 targetUid + "_" + auth.currentUser.uid;
    setupTab(pmId, targetName, 'pm');
}

function setupTab(id, name, type) {
    if (!openTabs[id]) {
        openTabs[id] = { id, name, type };
        const path = type === 'room' ? `rooms/${id}/messages` : `pms/${id}/messages`;
        
        // Listener for messages
        db.ref(path).limitToLast(30).on('child_added', snap => {
            renderMessage(id, snap.val());
        });

        // Game Listener (if room)
        if (type === 'room') {
            db.ref(`rooms/${id}/game`).on('value', snap => {
                if (activeTab === id) renderGameUI(snap.val());
                if (snap.val()?.status === 'idle' && !snap.val()?.waitStartedAt) triggerAutoStart(id);
            });
        }
    }
    activeTab = id;
    renderTabs();
    showView('view-chat');
    document.getElementById('active-tab-name').innerText = name;
    document.getElementById('chat-header-name').innerText = (type === 'pm' ? "Chat with " : "") + name;
    switchTabMessages(id);
}

function renderTabs() {
    let html = "";
    Object.keys(openTabs).forEach(tid => {
        if (tid === activeTab) return;
        html += `<div class="tab-icon" onclick="setupTab('${tid}', '${openTabs[tid].name}', '${openTabs[tid].type}')">${openTabs[tid].type === 'pm' ? '👤' : '💬'}</div>`;
    });
    document.getElementById('dynamic-tabs').innerHTML = html;
}

function switchTabMessages(id) {
    document.getElementById('chat-messages').innerHTML = "";
    const path = openTabs[id].type === 'room' ? `rooms/${id}/messages` : `pms/${id}/messages`;
    db.ref(path).limitToLast(30).once('value', snap => {
        snap.forEach(m => renderMessage(id, m.val()));
    });
}

function renderMessage(tabId, msg) {
    if (activeTab !== tabId) return;
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = "msg" + (openTabs[tabId].type === 'pm' ? " private" : "");
    div.innerHTML = `<span class="sender" style="color:${msg.uid==='BOT'?'green':'#1a52a8'}">${msg.username}:</span> ${msg.text}`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || !activeTab) return;
    input.value = "";

    if (text.startsWith('/')) { handleSpecialCmd(text); return; }

    const path = openTabs[activeTab].type === 'room' ? `rooms/${activeTab}/messages` : `pms/${activeTab}/messages`;
    
    db.ref(path).push({
        uid: auth.currentUser.uid,
        username: userProfile.username,
        text: text,
        timestamp: Date.now()
    });

    // Earn XP for chatting
    db.ref('users/' + auth.currentUser.uid + '/xp').set(firebase.database.ServerValue.increment(2));
    db.ref('users/' + auth.currentUser.uid + '/credits').set(firebase.database.ServerValue.increment(1));
}

function handleSpecialCmd(raw) {
    const parts = raw.split(" ");
    const cmd = parts[0].toLowerCase();

    // PM Command: /msg @user hello
    if (cmd === "/msg") {
        const targetName = parts[1].replace('@', '');
        const msgText = parts.slice(2).join(" ");
        db.ref('usernames/' + targetName.toLowerCase()).once('value', snap => {
            const uid = snap.val();
            if (uid) startPM(uid, targetName);
        });
        return;
    }

    // Admin Commands
    if (cmd === "/mute" || cmd === "/kick") {
        if (ROLE_RANK[userProfile.role] < 2) return; // Must be Mentor+
        const targetName = parts[1].replace('@', '');
        const mins = cmd === "/kick" ? 15 : (parseInt(parts[2]) || 60);
        
        db.ref('usernames/' + targetName.toLowerCase()).once('value', snap => {
            if (snap.val()) {
                db.ref('users/' + snap.val()).update({ mutedUntil: Date.now() + (mins * 60000) });
                postBotMsg(activeTab, `${targetName} has been muted for ${mins} minutes by ${userProfile.username}`);
            }
        });
    }

    // Bot control
    if (cmd === "/bot") {
        if (OFFICIAL_ROOMS.includes(activeTab) && ROLE_RANK[userProfile.role] < 4) return;
        db.ref(`rooms/${activeTab}/game`).set({ type: parts[1], status: 'idle', players: {}, round: 0 });
    }
}

function postBotMsg(rid, text) {
    db.ref(`rooms/${rid}/messages`).push({ uid: 'BOT', username: 'mig Bot', text, timestamp: Date.now() });
}

// --- GAME LOGIC (Automated) ---
function triggerAutoStart(rid) {
    const waitId = Date.now();
    db.ref(`rooms/${rid}/game`).update({ waitStartedAt: waitId });
    setTimeout(() => {
        db.ref(`rooms/${rid}/game`).once('value', snap => {
            const s = snap.val();
            if (s?.waitStartedAt === waitId && Object.keys(s.players || {}).length >= 2) {
                db.ref(`rooms/${rid}/game`).update({ status: 'active', waitStartedAt: null, roundStartedAt: Date.now() });
                postBotMsg(rid, "Game Starting Automatically!");
            }
        });
    }, 10000);
}

function renderGameUI(s) {
    const gui = document.getElementById('game-ui');
    if (!s) { gui.style.display = "none"; return; }
    gui.style.display = "block";
    gui.innerText = `${s.type.toUpperCase()} | Players: ${Object.keys(s.players || {}).length} | Status: ${s.status}`;
}

function closeCurrentTab() {
    delete openTabs[activeTab];
    activeTab = null;
    showFriends();
}

function escapeHtml(text) {
  const p = document.createElement('p');
  p.textContent = text;
  return p.innerHTML;
}
</script>
</body>
</html>
