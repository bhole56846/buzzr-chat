<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CircleHub - The Ultimate Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f37021; --p-dark: #d45d1a; --bg: #f2f4f7;
            --white: #ffffff; --grey: #65676b;
            --purple: #9b59b6; --pink: #e75fb3; --red: #e32636; --admin: #e8820c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; outline: none; }
        body { background-color: #000; height: 100vh; overflow: hidden; }
        .app-shell { width: 100%; max-width: 500px; margin: 0 auto; height: 100dvh; background: var(--bg); display: flex; flex-direction: column; position: relative; }

        /* Role Colors */
        .role-owner, .role-globaladmin { color: var(--admin) !important; font-weight: 800; }
        .role-redmerchant { color: var(--red) !important; font-weight: 800; }
        .role-merchant { color: var(--purple) !important; font-weight: 800; }
        .role-submerchant { color: var(--pink) !important; font-weight: 800; }

        /* Header */
        .header { background: linear-gradient(135deg, var(--primary), var(--p-dark)); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; color: white; flex-shrink: 0; }
        .header h1 { font-size: 24px; font-weight: 900; font-style: italic; letter-spacing: -1.5px; }
        .eco-box { text-align: right; line-height: 1.2; font-weight: 800; }
        .eco-box span { font-size: 13px; }
        .eco-box small { font-size: 9px; opacity: 0.9; display: block; }

        /* Views */
        .view { display: none; flex: 1; overflow-y: auto; background: var(--bg); }
        .view.active { display: block; }
        .view.flex-view.active { display: flex; flex-direction: column; height: 100%; background: #fff; }

        /* Home/Feed */
        .post-input-card { background: white; margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .post-input-card textarea { width: 100%; height: 60px; border: none; background: #f0f2f5; padding: 12px; border-radius: 10px; resize: none; font-size: 14px; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 12px; border: none; background: var(--primary); color: white; font-weight: 800; border-radius: 10px; cursor: pointer; }
        .feed-card { background: white; margin: 10px; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .feed-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .feed-header img { width: 32px; height: 32px; border-radius: 50%; background: #eee; }

        /* Chatroom List */
        .room-row { background: white; margin: 8px 12px; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid #eee; }
        .room-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        /* Active Chat UI */
        .chat-nav { background: white; padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .msg-scroll { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #fdfdfd; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .bubble.sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .bubble.received { align-self: flex-start; background: #f0f2f5; border-bottom-left-radius: 2px; }
        .bubble small { display: block; font-size: 10px; font-weight: 800; margin-bottom: 3px; }
        
        .bot-tag { align-self: center; background: #1c3a55; color: #ffcf6e; padding: 6px 15px; border-radius: 20px; font-size: 11px; font-weight: 600; text-align: center; margin: 5px 0; }

        /* Fixed Chat Input */
        .input-bar-fixed { padding: 10px 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
        .input-bar-fixed input { flex: 1; border: none; background: #f0f2f5; padding: 12px 15px; border-radius: 25px; font-size: 14px; }
        .btn-circle { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Bottom Menu */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { text-align: center; color: #888; font-size: 10px; font-weight: 700; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
        .nav-link span { display: block; font-size: 22px; margin-bottom: 2px; }

        /* Dashboard */
        .admin-card { background: white; margin: 15px; padding: 20px; border-radius: 15px; border: 1px solid #ddd; }
        .dash-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; }

        #auth-overlay { position: absolute; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
    </style>
</head>
<body>

    <div class="app-shell">
        <!-- Header -->
        <header class="header" id="app-header" style="display:none;">
            <h1 onclick="location.reload()">CircleHub</h1>
            <div class="eco-box">
                <span>💰 <span id="cr-val">0</span></span>
                <small>रु <span id="npr-val">0.00</span> | $<span id="usd-val">0.00</span></small>
            </div>
        </header>

        <!-- View 1: Home (Feeds) -->
        <div id="view-home" class="view active">
            <div class="post-input-card">
                <textarea id="st-input" placeholder="Share your thoughts..."></textarea>
                <button class="btn-main" onclick="postStatus()">POST UPDATE</button>
            </div>
            <div id="feed-list"></div>
        </div>

        <!-- View 2: Chat Rooms -->
        <div id="view-rooms" class="view">
            <div style="padding: 15px 15px 5px; font-size: 12px; font-weight: 800; color: #888;">OFFICIAL GLOBAL ROOMS</div>
            <div class="room-row" onclick="openRoom('welcome_zone', 'Welcome Zone 🤝', '#3498db')">
                <div class="room-icon" style="background:#3498db; color:white;">🤝</div>
                <div style="flex:1"><b>Welcome Zone</b><br><small>New arrivals lounge</small></div>
            </div>
            <div class="room-row" onclick="openRoom('vibe_market', 'Vibe Market 🛍️', '#9b59b6')">
                <div class="room-icon" style="background:#9b59b6; color:white;">🛍️</div>
                <div style="flex:1"><b>Vibe Market</b><br><small>Virtual Trade Hub</small></div>
            </div>
            <div class="room-row" onclick="openRoom('game_central', 'Game Central 🏟️', '#e67e22')">
                <div class="room-icon" style="background:#e67e22; color:white;">🏟️</div>
                <div style="flex:1"><b>Game Central</b><br><small>Games & Arena</small></div>
            </div>
        </div>

        <!-- View 3: Admin Dashboard -->
        <div id="view-admin" class="view">
            <div style="padding:15px; font-size:12px; font-weight:800; color:#888;">OWNER DASHBOARD 👑</div>
            <div class="admin-card">
                <input type="text" id="adm-user" class="dash-input" placeholder="Username (no @)">
                <input type="number" id="adm-cr" class="dash-input" placeholder="Credits Amount">
                <button class="btn-main" style="margin-bottom:10px;" onclick="adminAction('credits')">ADD CREDITS</button>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn-main" style="background:var(--red);" onclick="adminAction('redmerchant')">SET RED M</button>
                    <button class="btn-main" style="background:var(--purple);" onclick="adminAction('merchant')">SET MERCHANT</button>
                    <button class="btn-main" style="background:var(--pink);" onclick="adminAction('submerchant')">SET PINK M</button>
                    <button class="btn-main" style="background:#555;" onclick="adminAction('globaladmin')">SET ADMIN</button>
                </div>
            </div>
        </div>

        <!-- View: Active Chat Window -->
        <div id="view-chat" class="view flex-view">
            <div class="chat-nav">
                <span onclick="changeView('rooms')" style="cursor:pointer; font-weight: 900; font-size: 20px;">←</span>
                <b id="active-room-title">Room</b>
            </div>
            <div class="msg-scroll" id="chat-msgs-box"></div>
            <div id="game-live-bar" class="bot-tag" style="display:none; background: #000; color: #0f0;"></div>
            <div class="input-bar-fixed">
                <input type="text" id="m-input" placeholder="Type a message...">
                <button class="btn-send" onclick="sendChatMessage()">➤</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" id="app-nav" style="display:none;">
            <div class="nav-link active" onclick="changeView('home', this)"><span>🏠</span>Home</div>
            <div class="nav-link" onclick="changeView('rooms', this)"><span>💬</span>Chat</div>
            <div class="nav-link" id="nav-adm-btn" style="display:none;" onclick="changeView('admin', this)"><span>👑</span>Admin</div>
            <div class="nav-link" onclick="logout()"><span>⚙️</span>Logout</div>
        </nav>

        <!-- Auth -->
        <div id="auth-view">
            <h1 style="font-size: 60px; font-weight: 900; color: var(--primary); font-style: italic; letter-spacing: -4px;">Circle<span>Hub</span></h1>
            <p style="margin-bottom: 40px; font-weight: 700; color: #888;">Nepal's Premier Social Arena</p>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
            <button onclick="authAction('login')" style="width: 100%; padding: 15px; border: none; background: var(--primary); color: white; font-weight: 900; border-radius: 12px;">LOG IN</button>
            <p onclick="authAction('signup')" style="margin-top: 25px; color: var(--primary); font-weight: 800; cursor: pointer;">Register CircleHub ID</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBL4fxOpQcu0otOtCzhq95X-uULIHrTP20",
            authDomain: "buzzr-987ea.firebaseapp.com",
            databaseURL: "https://buzzr-987ea-default-rtdb.firebaseio.com",
            projectId: "buzzr-987ea",
            storageBucket: "buzzr-987ea.firebasestorage.app",
            messagingSenderId: "557198372950",
            appId: "1:557198372950:web:ab3415c2fe09cbf7d34bf7"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let me = null;
        let activeRoom = null;
        const NPR_RATE = 151.39;
        const CR_RATE = 1000;

        function authAction(type) {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            if (type === 'login') {
                auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
            } else {
                auth.createUserWithEmailAndPassword(e, p).then(res => {
                    db.ref('users').once('value', s => {
                        const isFirst = !s.exists();
                        db.ref('users/' + res.user.uid).set({
                            username: e.split('@')[0], credits: isFirst ? 500000 : 500,
                            xp: 0, role: isFirst ? 'owner' : 'member', av: Math.floor(Math.random() * 800)
                        });
                        db.ref('usernames/' + e.split('@')[0].toLowerCase()).set(res.user.uid);
                    });
                }).catch(err => alert(err.message));
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('app-header').style.display = 'flex';
                document.getElementById('app-nav').style.display = 'flex';
                db.ref('users/' + user.uid).on('value', snap => {
                    me = snap.val(); me.uid = user.uid;
                    updateDashboard();
                });
                loadFeeds();
            } else {
                document.getElementById('auth-view').style.display = 'flex';
            }
        });

        function updateDashboard() {
            if (!me) return;
            const usd = me.credits / CR_RATE;
            document.getElementById('cr-val').innerText = Math.floor(me.credits).toLocaleString();
            document.getElementById('usd-val').innerText = usd.toFixed(2);
            document.getElementById('npr-val').innerText = (usd * NPR_RATE).toFixed(2);
            if (me.role === 'owner') document.getElementById('nav-adm-btn').style.display = 'block';
        }

        // --- FEED ---
        function postStatus() {
            const t = document.getElementById('st-input').value;
            if (!t) return;
            db.ref('feeds').push({ uid: me.uid, name: me.username, text: t, av: me.av, role: me.role, time: Date.now() });
            document.getElementById('st-input').value = "";
        }
        function loadFeeds() {
            db.ref('feeds').limitToLast(15).on('value', snap => {
                const c = document.getElementById('feed-list'); c.innerHTML = "";
                snap.forEach(p => {
                    const d = p.val();
                    c.innerHTML += `<div class="feed-card">
                        <div class="feed-header"><img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${d.av}">
                        <b class="role-${d.role}">${d.name}</b></div>
                        <div style="font-size:14px;">${d.text}</div></div>`;
                });
            });
        }

        // --- CHAT & ROOMS ---
        function openRoom(id, title) {
            activeRoom = id;
            document.getElementById('active-room-title').innerText = title;
            changeView('chat');
            db.ref(`messages/${id}`).limitToLast(40).on('value', s => {
                const box = document.getElementById('chat-msgs-box'); box.innerHTML = "";
                s.forEach(m => {
                    const d = m.val();
                    if (d.uid === 'BOT') box.innerHTML += `<div class="bot-tag">${d.text}</div>`;
                    else {
                        const isMe = d.uid === me.uid;
                        box.innerHTML += `<div class="bubble ${isMe ? 'sent' : 'received'}">
                        <small class="role-${d.role}">${d.name}</small>${d.text}</div>`;
                    }
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendChatMessage() {
            const inp = document.getElementById('m-input');
            if (!inp.value || !activeRoom) return;
            db.ref(`messages/${activeRoom}`).push({ uid: me.uid, name: me.username, text: inp.value, role: me.role, time: Date.now() });
            inp.value = "";
        }

        function adminAction(type) {
            const u = document.getElementById('adm-user').value.toLowerCase();
            const v = document.getElementById('adm-cr').value;
            db.ref('usernames/' + u).once('value', s => {
                const uid = s.val(); if (!uid) return alert("User not found");
                if (type === 'credits') db.ref(`users/${uid}/credits`).set(firebase.database.ServerValue.increment(parseInt(v)));
                else db.ref(`users/${uid}/role`).set(type);
                alert("Action Done!");
            });
        }

        function changeView(vid, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + vid).classList.add('active');
            if (el) { document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active')); el.classList.add('active'); }
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
