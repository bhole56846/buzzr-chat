<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CircleHub - Nepal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f37021; --bg: #f2f4f7; --white: #fff;
            --purple: #9b59b6; --pink: #e75fb3; --red: #e32636; --admin: #e8820c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; outline: none; }
        body { background-color: #000; height: 100vh; overflow: hidden; }
        
        .app-shell { width: 100%; max-width: 500px; margin: 0 auto; height: 100dvh; background: var(--bg); display: flex; flex-direction: column; position: relative; }

        /* Header */
        .header { background: linear-gradient(135deg, var(--primary), #d45d1a); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; color: white; flex-shrink: 0; }
        .header h1 { font-size: 22px; font-weight: 900; font-style: italic; letter-spacing: -1px; }
        .eco { text-align: right; line-height: 1.1; }
        .eco b { font-size: 13px; display: block; }
        .eco small { font-size: 9px; opacity: 0.9; }

        /* Navigation Views */
        .view { display: none; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .view.active { display: block; }
        .view.chat-mode.active { display: flex; flex-direction: column; background: #fff; padding-bottom: 0; }

        /* Feed Styling */
        .post-card { background: white; margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .post-card textarea { width: 100%; height: 60px; border: none; background: #f0f2f5; padding: 10px; border-radius: 10px; resize: none; margin-bottom: 10px; font-size: 14px; }
        .feed-item { background: white; margin: 10px; padding: 15px; border-radius: 12px; border-bottom: 1px solid #eee; }
        
        /* Room Styling */
        .room-item { background: white; margin: 8px 12px; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid #eee; }
        .room-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; }

        /* Chat System */
        .msg-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #fdfdfd; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .bubble.sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .bubble.received { align-self: flex-start; background: #f0f2f5; border-bottom-left-radius: 2px; }
        
        .chat-input-bar { padding: 10px 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .chat-input-bar input { flex: 1; border: none; background: #f0f2f5; padding: 12px 15px; border-radius: 25px; font-size: 14px; }

        /* Bottom Nav */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 10px; font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { display: block; font-size: 22px; margin-bottom: 4px; }

        /* Admin Panel */
        .admin-card { background: white; margin: 15px; padding: 20px; border-radius: 15px; border: 1px solid #ddd; }
        .adm-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; }

        /* Role Colors */
        .role-owner, .role-globaladmin { color: var(--admin) !important; font-weight: 900; }
        .role-merchant { color: var(--purple) !important; }
        .role-submerchant { color: var(--pink) !important; }
        .role-redmerchant { color: var(--red) !important; }

        #auth-screen { position: absolute; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
    </style>
</head>
<body>

    <div class="app-shell">
        <!-- App Header -->
        <header class="header" id="app-header" style="display:none;">
            <h1>CircleHub</h1>
            <div class="eco">
                <b>💰 <span id="cr-val">0</span></b>
                <small>रु <span id="npr-val">0.00</span> | $<span id="usd-val">0.00</span></small>
            </div>
        </header>

        <!-- HOME VIEW -->
        <div id="view-home" class="view active">
            <div class="post-card">
                <textarea id="status-box" placeholder="What's your vibe today?"></textarea>
                <button onclick="postFeed()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:800; cursor:pointer;">POST STATUS</button>
            </div>
            <div id="feed-list"></div>
        </div>

        <!-- ROOMS VIEW -->
        <div id="view-rooms" class="view">
            <div style="padding: 15px; font-size: 11px; font-weight: 800; color: #888;">GLOBAL CHATROOMS</div>
            <div class="room-item" onclick="joinChat('welcome_zone', 'Welcome Zone 🤝', '#3498db')">
                <div class="room-icon" style="background:#3498db;">🤝</div>
                <div style="flex:1"><b>Welcome Zone</b><br><small>New arrivals lounge</small></div>
            </div>
            <div class="room-item" onclick="joinChat('vibe_market', 'Vibe Market 🛍️', '#9b59b6')">
                <div class="room-icon" style="background:#9b59b6;">🛍️</div>
                <div style="flex:1"><b>Vibe Market</b><br><small>Virtual Trade Hub</small></div>
            </div>
            <div class="room-item" onclick="joinChat('game_central', 'Game Central 🏟️', '#e67e22')">
                <div class="room-icon" style="background:#e67e22;">🏟️</div>
                <div style="flex:1"><b>Game Central</b><br><small>Arena & Games</small></div>
            </div>
        </div>

        <!-- CHAT WINDOW VIEW -->
        <div id="view-chat" class="view chat-mode">
            <div style="background: white; padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px;">
                <span onclick="switchView('rooms')" style="cursor:pointer; font-weight: 900; font-size: 20px;">←</span>
                <b id="active-chat-name">Room</b>
            </div>
            <div class="msg-container" id="chat-box"></div>
            <div class="chat-input-bar">
                <input type="text" id="chat-input-field" placeholder="Type here...">
                <button onclick="sendChat()" style="background:var(--primary); color:white; border:none; width:40px; height:40px; border-radius:50%; font-weight:900;">➤</button>
            </div>
        </div>

        <!-- ADMIN VIEW -->
        <div id="view-admin" class="view">
            <div style="padding:15px; font-size:12px; font-weight:800; color:#888;">OWNER PANEL 👑</div>
            <div class="admin-card">
                <input type="text" id="adm-username" class="adm-input" placeholder="Username">
                <input type="number" id="adm-amount" class="adm-input" placeholder="CR Amount">
                <button onclick="adminAction('credits')" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:800; margin-bottom:10px;">ADD CREDITS</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <button style="padding:10px; background:var(--red); border:none; color:white; border-radius:8px; font-size:11px; font-weight:800;" onclick="adminAction('redmerchant')">SET RED M</button>
                    <button style="padding:10px; background:var(--purple); border:none; color:white; border-radius:8px; font-size:11px; font-weight:800;" onclick="adminAction('merchant')">SET PURPLE M</button>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav" id="bottom-bar" style="display:none;">
            <div class="nav-item active" onclick="switchView('home', this)"><span>🏠</span>Home</div>
            <div class="nav-item" onclick="switchView('rooms', this)"><span>💬</span>Chat</div>
            <div class="nav-item" id="admin-icon" style="display:none;" onclick="switchView('admin', this)"><span>👑</span>Admin</div>
            <div class="nav-item" onclick="logout()"><span>⚙️</span>Logout</div>
        </nav>

        <!-- AUTH SCREEN -->
        <div id="auth-screen">
            <h1 style="font-size: 55px; font-weight: 900; color: var(--primary); font-style: italic; letter-spacing: -3px;">Circle<span>Hub</span></h1>
            <p style="margin-bottom: 40px; font-weight: 700; color: #888;">Modern Social Arena</p>
            <input type="email" id="auth-mail" style="width:100%; padding:15px; border-radius:12px; border:1px solid #ddd; margin-bottom:10px;" placeholder="Email Address">
            <input type="password" id="auth-pass" style="width:100%; padding:15px; border-radius:12px; border:1px solid #ddd; margin-bottom:20px;" placeholder="Password">
            <button onclick="handleAuth('login')" style="width: 100%; padding: 15px; border: none; background: var(--primary); color: white; font-weight: 900; border-radius: 12px;">LOGIN</button>
            <p onclick="handleAuth('signup')" style="margin-top: 25px; color: var(--primary); font-weight: 800; cursor: pointer;">Join CircleHub Free</p>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBL4fxOpQcu0otOtCzhq95X-uULIHrTP20",
            authDomain: "buzzr-987ea.firebaseapp.com",
            databaseURL: "https://buzzr-987ea-default-rtdb.firebaseio.com",
            projectId: "buzzr-987ea",
            storageBucket: "buzzr-987ea.firebasestorage.app",
            messagingSenderId: "557198372950",
            appId: "1:557198372950:web:ab3415c2fe09cbf7d34bf7"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let me = null;
        let activeRid = null;

        // AUTH
        function handleAuth(type) {
            const e = document.getElementById('auth-mail').value;
            const p = document.getElementById('auth-pass').value;
            if(type==='login') auth.signInWithEmailAndPassword(e, p).catch(err=>alert(err.message));
            else {
                auth.createUserWithEmailAndPassword(e, p).then(res => {
                    db.ref('users').once('value', s => {
                        const isOwner = !s.exists();
                        db.ref('users/' + res.user.uid).set({
                            username: e.split('@')[0], credits: isOwner ? 100000 : 500, xp: 0, role: isOwner ? 'owner' : 'member', av: Math.floor(Math.random()*800)
                        });
                        db.ref('usernames/'+e.split('@')[0].toLowerCase()).set(res.user.uid);
                    });
                }).catch(err=>alert(err.message));
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-header').style.display = 'flex';
                document.getElementById('bottom-bar').style.display = 'flex';
                db.ref('users/' + user.uid).on('value', snap => {
                    me = snap.val(); me.uid = user.uid;
                    document.getElementById('cr-val').innerText = Math.floor(me.credits).toLocaleString();
                    document.getElementById('usd-val').innerText = (me.credits / 1000).toFixed(2);
                    document.getElementById('npr-val').innerText = ((me.credits/1000)*151.39).toFixed(2);
                    if(me.role==='owner') document.getElementById('admin-icon').style.display = 'block';
                });
                loadFeeds();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        // FEED
        function postFeed() {
            const t = document.getElementById('status-box').value;
            if(!t) return;
            db.ref('feeds').push({ name: me.username, text: t, role: me.role, av: me.av, time: Date.now() });
            document.getElementById('status-box').value = "";
        }
        function loadFeeds() {
            db.ref('feeds').limitToLast(10).on('value', s => {
                const c = document.getElementById('feed-list'); c.innerHTML = "";
                s.forEach(p => {
                    const d = p.val();
                    c.innerHTML += `<div class="feed-item">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
                            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${d.av}" style="width:25px;border-radius:50%">
                            <b class="role-${d.role}">${d.name}</b>
                        </div>
                        <div style="font-size:14px">${d.text}</div>
                    </div>`;
                });
            });
        }

        // CHAT
        function joinChat(id, title) {
            activeRid = id;
            document.getElementById('active-chat-name').innerText = title;
            switchView('chat');
            const box = document.getElementById('chat-box');
            db.ref(`messages/${id}`).limitToLast(30).on('value', s => {
                box.innerHTML = "";
                s.forEach(m => {
                    const d = m.val();
                    const isMe = d.uid === auth.currentUser.uid;
                    box.innerHTML += `<div class="bubble ${isMe ? 'sent' : 'received'}">
                        <small class="role-${d.role}">${d.name}</small>${d.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendChat() {
            const i = document.getElementById('chat-input-field');
            if(!i.value || !activeRid) return;
            db.ref(`messages/${activeRid}`).push({ uid: me.uid, name: me.username, text: i.value, role: me.role, time: Date.now() });
            i.value = "";
        }

        // ADMIN
        function adminAction(type) {
            const u = document.getElementById('adm-username').value.toLowerCase();
            const a = document.getElementById('adm-amount').value;
            db.ref('usernames/'+u).once('value', s => {
                const uid = s.val(); if(!uid) return alert("User not found");
                if(type==='credits') db.ref(`users/${uid}/credits`).set(firebase.database.ServerValue.increment(parseInt(a)));
                else db.ref(`users/${uid}/role`).set(type);
                alert("Action Success!");
            });
        }

        // NAV
        function switchView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            if(el) { document.querySelectorAll('.nav-item').forEach(l=>l.classList.remove('active')); el.classList.add('active'); }
        }

        function logout() { auth.signOut().then(()=>location.reload()); }
    </script>
</body>
</html>
