<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>mig33 Ultimate Secure</title>
<style>
/* --- mig33 J2ME STYLE (Mobile Friendly) --- */
* { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
body { font-family: Tahoma, Geneva, sans-serif; background: #000; height: 100vh; overflow: hidden; }
.app { width: 100%; height: 100dvh; background: #f4f4f4; display: flex; flex-direction: column; position: relative; }

/* Blue Tabstrip */
.tabstrip { display: flex; background: #2a72a8; border-bottom: 2px solid #15466e; overflow-x: auto; flex-shrink: 0; }
.tab-icon { min-width: 50px; height: 45px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #15466e; cursor: pointer; color: #fff; font-size: 20px; position: relative; }
.tab-icon.active { background: #eef4f8; color: #15466e; }
.tab-icon.unread::after { content: ''; position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: #f5d51c; border-radius: 50%; border: 1px solid #000; }

/* Top Bar */
.topbar { background: linear-gradient(to bottom, #f0a13a, #d4730a); padding: 10px; display: flex; align-items: center; gap: 8px; color: #fff; border-bottom: 1px solid #8a4f06; }
.presence-dot { width: 12px; height: 12px; border-radius: 50%; background: #4ec73f; border: 1px solid rgba(0,0,0,0.2); }
.who { flex: 1; overflow: hidden; }
.who b { font-size: 14px; display: block; white-space: nowrap; text-overflow: ellipsis; }
.who small { font-size: 10px; font-weight: bold; }
.cr-chip { background: rgba(0,0,0,0.2); padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }

/* Content Areas */
.content { flex: 1; overflow-y: auto; background: #fff; }
.section-strip { background: #d4d4d4; padding: 6px 10px; font-size: 11px; font-weight: bold; border-bottom: 1px solid #bbb; text-transform: uppercase; }
.list-row { display: flex; align-items: center; gap: 12px; padding: 12px 10px; border-bottom: 1px dashed #ccc; }

/* Chat Bubbles */
.chat-msgs { flex: 1; overflow-y: auto; padding-bottom: 10px; }
.msg { padding: 8px 10px; border-bottom: 1px dashed #eee; font-size: 13px; line-height: 1.4; }
.msg.bot { background: #f0f4f7; color: #1c3a55; border-left: 4px solid #2a72a8; font-family: monospace; }
.msg.pm { background: #fffde6; border-left: 4px solid #f0a13a; }
.sender { font-weight: bold; margin-right: 5px; }
.av-head { width: 24px; height: 24px; vertical-align: middle; border: 1px solid #ccc; margin-right: 5px; image-rendering: pixelated; }

/* Inputs */
.input-bar { display: flex; padding: 10px; background: #d8dadb; border-top: 1px solid #bbb; gap: 8px; }
.input-bar input { flex: 1; padding: 10px; border: 1px solid #999; border-radius: 4px; font-size: 15px; }
.input-bar button { padding: 10px 18px; background: linear-gradient(to bottom, #ffd87a, #d97f10); border: 1px solid #7a4f0a; font-weight: bold; border-radius: 4px; }

#game-bar { background: #1c3a55; color: #ffcf6e; padding: 8px; font-size: 12px; text-align: center; border-top: 1px solid #000; display: none; }
.modal { position: absolute; bottom: 65px; left: 10px; right: 10px; background: #fff; border: 2px solid #2a72a8; padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
.modal img { width: 35px; height: 35px; }

.view { display: none; flex-direction: column; height: 100%; }
.active-view { display: flex; }
</style>
</head>
<body>

<div class="app">
    <!-- Auth View -->
    <div id="view-auth" class="view active-view">
        <div style="background:#2a72a8; padding:50px 20px; text-align:center; color:#fff;">
            <h1 style="font-style:italic; font-size:50px; letter-spacing:-3px;">mig<span style="color:#f0a13a">33</span></h1>
            <p style="font-size:12px;">Secure ID System</p>
        </div>
        <div style="padding:20px; background:#d8dadb; flex:1;">
            <input type="email" id="auth-email" placeholder="Email Address" style="width:100%; padding:14px; margin-bottom:10px;">
            <input type="password" id="auth-pass" placeholder="Password" style="width:100%; padding:14px; margin-bottom:15px;">
            <button onclick="login()" style="width:100%; padding:14px;">Login</button>
            <div style="text-align:center; margin:25px 0; font-weight:bold; color:#666;">-- NEW ACCOUNT --</div>
            <input type="text" id="reg-user" placeholder="Username" style="width:100%; padding:14px; margin-bottom:10px;">
            <button onclick="register()" style="width:100%; padding:14px; background:#2a72a8; color:#fff;">Register Secure ID</button>
        </div>
    </div>

    <!-- Main View -->
    <div id="view-main" class="view">
        <div class="tabstrip">
            <div class="tab-icon active" onclick="showSec('friends')">👥</div>
            <div class="tab-icon" onclick="showSec('rooms')">💬</div>
            <div class="tab-icon" onclick="toggleAvatars()">👤</div>
            <div id="dynamic-tabs" style="display:flex;"></div>
        </div>
        <div class="topbar">
            <div class="presence-dot"></div>
            <div class="who" id="my-info"></div>
            <div class="cr-chip" id="my-cr">💰 0</div>
        </div>
        
        <div id="sec-friends" class="sec content">
            <div class="section-strip">Online Friends</div>
            <div id="friends-list"></div>
        </div>

        <div id="sec-rooms" class="sec content" style="display:none;">
            <div class="section-strip">Arenas</div>
            <div id="official-rooms"></div>
        </div>

        <div id="sec-chat" class="sec" style="display:none; flex:1; flex-direction:column;">
            <div id="chat-msgs" class="chat-msgs"></div>
            <div id="game-bar"></div>
            <div class="input-bar">
                <span style="font-size:22px;" onclick="toggleEmojis()">😊</span>
                <input type="text" id="chat-input" placeholder="Say something...">
                <button onclick="sendMsg()">Send</button>
            </div>
        </div>
    </div>

    <div id="av-modal" class="modal"></div>
    <div id="em-modal" class="modal" style="grid-template-columns: repeat(7, 1fr);"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// --- YOUR CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyBL4fxOpQcu0otOtCzhq95X-uULIHrTP20",
  authDomain: "buzzr-987ea.firebaseapp.com",
  databaseURL: "https://buzzr-987ea-default-rtdb.firebaseio.com",
  projectId: "buzzr-987ea",
  storageBucket: "buzzr-987ea.firebasestorage.app",
  messagingSenderId: "557198372950",
  appId: "1:557198372950:web:ab3415c2fe09cbf7d34bf7"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// --- ASSETS ---
const HEADS = Array.from({length: 20}, (_, i) => `https://api.dicebear.com/7.x/pixel-art/svg?seed=mig${i+100}&size=64&backgroundColor=b6e3f4`);
const EMOJIS = ["😀","😂","😅","😉","😊","😋","😎","😍","🤔","😐","😑","😪","😴","😜","🤤","😒","😔","😭","😲","😡"];
const ROLES = {
    member: { rank: 0, color: '#1a52a8', label: 'Member' },
    mentor: { rank: 2, color: '#e63946', label: 'Mentor' },
    globaladmin: { rank: 4, color: '#e8820c', label: 'Admin' },
    owner: { rank: 5, color: '#e8820c', label: 'Owner' }
};

let me = null;
let curTab = null;
let openTabs = {};

// --- SECURITY ---
function normalizeEmail(email) {
    let [u, d] = email.toLowerCase().trim().split('@');
    if (d === 'gmail.com') u = u.split('+')[0].replace(/\./g, '');
    return u + '@' + d;
}

function getFP() {
    let id = localStorage.getItem('mig_fp');
    if (!id) { id = 'm_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('mig_fp', id); }
    return id;
}

// --- AUTH ---
function login() {
    const e = normalizeEmail(document.getElementById('auth-email').value);
    auth.signInWithEmailAndPassword(e, document.getElementById('auth-pass').value).catch(err => alert(err.message));
}

function register() {
    const u = document.getElementById('reg-user').value.trim();
    const er = document.getElementById('auth-email').value.trim();
    const p = document.getElementById('auth-pass').value;

    if(!u || !er || p.length < 6) return alert("Check details (Pass 6+).");
    const e = normalizeEmail(er);
    const fp = getFP();

    db.ref('devices/'+fp).once('value', s => {
        if((s.val() || 0) >= 2) return alert("Limit: 2 IDs per phone.");
        
        auth.createUserWithEmailAndPassword(e, p).then(res => {
            db.ref('users').once('value', us => {
                const isOwner = !us.exists(); // पहिलो युजर OWNER बन्ने सिस्टम
                db.ref('users/'+res.user.uid).set({
                    username: u, credits: isOwner ? 200000 : 500, xp: 0,
                    role: isOwner ? 'owner' : 'member', av: 0, fp
                });
                db.ref('usernames/'+u.toLowerCase()).set(res.user.uid);
                db.ref('devices/'+fp).set((s.val()||0)+1);
                if(isOwner) alert("You are the Owner!");
            });
        }).catch(err => alert("Email already taken."));
    });
}

auth.onAuthStateChanged(user => {
    if (user) {
        db.ref('users/'+user.uid).on('value', s => { 
            if(s.exists()){ me = s.val(); me.uid = user.uid; updateUI(); }
        });
        showSec('friends');
        document.getElementById('view-auth').classList.remove('active-view');
        document.getElementById('view-main').classList.add('active-view');
        loadRooms(); refreshFriends();
    } else {
        document.getElementById('view-main').classList.remove('active-view');
        document.getElementById('view-auth').classList.add('active-view');
    }
});

function updateUI() {
    if(!me) return;
    const lvl = Math.floor(me.xp / 100) + 1;
    document.getElementById('my-info').innerHTML = `<b style="color:${ROLES[me.role].color}">${me.username}</b><br><small>Level ${lvl} ${ROLES[me.role].label}</small>`;
    document.getElementById('my-cr').innerText = "💰 " + (me.credits || 0).toLocaleString();
}

// --- CRICKET ENGINE (Ball-by-Ball) ---
function autoStart(rid) {
    const wid = Date.now();
    db.ref(`rooms/${rid}/game`).update({ waitStartedAt: wid });
    setTimeout(() => {
        db.ref(`rooms/${rid}/game`).once('value', s => {
            if(s.val()?.waitStartedAt === wid && Object.keys(s.val().players||{}).length >= 2) {
                const rt = Date.now();
                db.ref(`rooms/${rid}/game`).update({ status:'active', waitStartedAt:null, roundTime:rt, botBowl:Math.floor(Math.random()*6)+1 });
                postBot(rid, "🏏 NEW BALL! Bat now: !b 1 to 6 (20s)");
                setTimeout(() => resolveCricket(rid, rt), 20000);
            }
        });
    }, 10000);
}

function resolveCricket(rid, time) {
    db.ref(`rooms/${rid}/game`).once('value', snap => {
        const g = snap.val();
        if(!g || g.roundTime !== time) return;
        const players = g.players || {};
        const bowl = g.botBowl;
        let logs = [`[Bot bowled a ${bowl}]`];

        Object.keys(players).forEach(uid => {
            const p = players[uid];
            if(p.status === 'batting') {
                const bat = p.move || Math.floor(Math.random()*6)+1;
                if(bat === bowl) {
                    db.ref(`rooms/${rid}/game/players/${uid}/status`).set('out');
                    logs.push(`🛑 ${p.username} OUT! Runs: ${p.score}`);
                } else {
                    const ns = (p.score || 0) + bat;
                    db.ref(`rooms/${rid}/game/players/${uid}`).update({ score:ns, move:null });
                    logs.push(`🏏 ${p.username} +${bat}`);
                }
            }
        });

        postBot(rid, logs.join(" | "));
        db.ref(`rooms/${rid}/game/players`).once('value', ps => {
            const alive = Object.values(ps.val()||{}).filter(p => p.status === 'batting');
            if(alive.length === 0) {
                const res = Object.values(ps.val()).sort((a,b) => b.score - a.score);
                if(res[0]) postBot(rid, `🏆 Match Over! Winner: ${res[0].username} (${res[0].score} runs)`);
                db.ref(`rooms/${rid}/game`).set({ status:'idle', players:null });
            } else {
                db.ref(`rooms/${rid}/game`).update({ status:'idle' });
            }
        });
    });
}

// --- CHAT SYSTEM ---
function openChat(id, n, type) {
    if(!openTabs[id]) {
        openTabs[id] = { id, n, type };
        db.ref(type === 'room' ? `rooms/${id}/messages` : `pms/${id}/messages`).limitToLast(1).on('child_added', s => {
            if(curTab?.id !== id) openTabs[id].unread = true;
            renderMsg(id, s.val()); updateTabs();
        });
        if(type === 'room' && id.includes('game')) {
            db.ref(`rooms/${id}/game`).on('value', s => {
                if(curTab?.id === id) renderGameUI(s.val());
                if(s.val()?.status === 'idle' && Object.keys(s.val().players||{}).length >= 2 && !s.val().waitStartedAt) autoStart(id);
            });
        }
    }
    curTab = openTabs[id]; curTab.unread = false;
    showSec('chat'); updateTabs(); loadHistory(id);
}

function sendMsg() {
    const inp = document.getElementById('chat-input');
    const v = inp.value.trim(); if(!v || !curTab) return;
    inp.value = "";
    if(v.startsWith('/')) return handleCmd(v);
    if(v === "!j") return db.ref(`rooms/${curTab.id}/game/players/${me.uid}`).set({ username:me.username, status:'batting', score:0 });
    if(v.startsWith("!b")) {
        const m = parseInt(v.split(" ")[1]);
        if(m>=1 && m<=6) return db.ref(`rooms/${curTab.id}/game/players/${me.uid}/move`).set(m);
    }
    const path = curTab.type === 'room' ? `rooms/${curTab.id}/messages` : `pms/${curTab.id}/messages`;
    db.ref(path).push({ uid:me.uid, username:me.username, text:v, av:me.av, color:ROLES[me.role].color, timestamp:Date.now() });
    db.ref('users/'+me.uid).update({ xp: firebase.database.ServerValue.increment(2), credits: firebase.database.ServerValue.increment(1) });
}

function renderMsg(tid, msg) {
    if(curTab?.id !== tid) return;
    const cont = document.getElementById('chat-msgs');
    const div = document.createElement('div');
    div.className = "msg " + (msg.type || "");
    const h = msg.uid !== 'BOT' ? `<img src="${HEADS[msg.av || 0]}" class="av-head">` : "";
    div.innerHTML = `${h}<span class="sender" style="color:${msg.color || '#1a52a8'}">${msg.username}:</span> ${msg.text}`;
    cont.appendChild(div); cont.scrollTop = cont.scrollHeight;
}

function handleCmd(raw) {
    const p = raw.split(" ");
    const c = p[0].toLowerCase();
    const t = (p[1] || "").replace('@','');
    const rank = ROLES[me.role].rank;

    if (c === "/addcr" && rank >= 5) {
        db.ref('usernames/'+t.toLowerCase()).once('value', s => {
            if(s.val()) db.ref('users/'+s.val()+'/credits').set(firebase.database.ServerValue.increment(parseInt(p[2])));
        });
    }
    if (c === "/who") {
        db.ref('usernames/'+t.toLowerCase()).once('value', s => {
            const uid = s.val(); if(!uid) return;
            db.ref('users/'+uid).once('value', us => {
                const u = us.val();
                const can = (rank >= 4 || uid === me.uid);
                renderMsg(curTab.id, {uid:'BOT', username:'System', text:`[WHO] ${u.username} | Lv: ${Math.floor(u.xp/100)+1} ${u.role} ${can ? '| CR: '+u.credits : ''}`});
            });
        });
    }
    if (c === "/promote" && rank >= 4) {
        db.ref('usernames/'+t.toLowerCase()).once('value', s => {
            if(s.val()) db.ref('users/'+s.val()+'/role').set(p[2]);
        });
    }
}

// --- UI ---
function updateTabs() {
    let h = "";
    Object.keys(openTabs).forEach(id => {
        const t = openTabs[id];
        h += `<div class="tab-icon ${curTab?.id === id ? 'active' : ''} ${t.unread ? 'unread' : ''}" onclick="openChat('${t.id}','${t.n}','${t.type}')">${t.type === 'pm' ? '👤' : '💬'}</div>`;
    });
    document.getElementById('dynamic-tabs').innerHTML = h;
}
function showSec(s) {
    document.querySelectorAll('.sec').forEach(el => el.style.display = 'none');
    document.getElementById('sec-' + s).style.display = s === 'chat' ? 'flex' : 'block';
}
function loadRooms() {
    const rs = [{id:'newbies', n:'Newbies'}, {id:'game-cricket', n:'Cricket Arena'}];
    document.getElementById('official-rooms').innerHTML = rs.map(r => `<div class="list-row" onclick="openChat('${r.id}','${r.n}','room')"><b>${r.n}</b></div>`).join('');
}
function refreshFriends() {
    db.ref('users').limitToFirst(20).once('value', s => {
        let h = "";
        s.forEach(u => { if(u.key !== me.uid) h += `<div class="list-row" onclick="openChat('${u.key}','${u.val().username}','pm')"><img src="${HEADS[u.val().av || 0]}" class="av-head"><b>${u.val().username}</b></div>`; });
        document.getElementById('friends-list').innerHTML = h;
    });
}
function loadHistory(id) {
    document.getElementById('chat-msgs').innerHTML = "";
    db.ref(openTabs[id].type === 'room' ? `rooms/${id}/messages` : `pms/${id}/messages`).limitToLast(20).once('value', s => s.forEach(m => renderMsg(id, m.val())));
}
function renderGameUI(g) {
    const b = document.getElementById('game-bar');
    if(!g) return b.style.display='none';
    b.style.display = 'block';
    b.innerText = `[CRICKET] ${g.status.toUpperCase()} | Players: ${Object.keys(g.players||{}).length}`;
}
function postBot(rid, t) { db.ref(`rooms/${rid}/messages`).push({ uid:'BOT', username:'mig Bot', text:t, type:'bot' }); }
function toggleAvatars() {
    const m = document.getElementById('av-modal');
    m.innerHTML = HEADS.map((u, i) => `<div onclick="setAv(${i})"><img src="${u}"></div>`).join('');
    m.style.display = m.style.display === 'grid' ? 'none' : 'grid';
}
function setAv(i) { db.ref('users/'+me.uid+'/av').set(i); document.getElementById('av-modal').style.display = 'none'; }
function toggleEmojis() {
    const m = document.getElementById('em-modal');
    m.innerHTML = EMOJIS.map(e => `<div onclick="document.getElementById('chat-input').value += '${e}'; document.getElementById('em-modal').style.display = 'none';">${e}</div>`).join('');
    m.style.display = m.style.display === 'grid' ? 'none' : 'grid';
}
</script>
</body>
</html>
