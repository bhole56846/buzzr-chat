/* --- mig33 AUTHENTIC UI (MOBILE FIXED) --- */
* { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
body { font-family: Tahoma, Geneva, sans-serif; background: #000; height: 100vh; overflow: hidden; }
.app { width: 100%; height: 100dvh; background: #f4f4f4; display: flex; flex-direction: column; position: relative; }

/* Blue Tabstrip */
.tabstrip { display: flex; background: #2a72a8; border-bottom: 2px solid #15466e; overflow-x: auto; flex-shrink: 0; }
.tab-icon { min-width: 55px; height: 45px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #15466e; cursor: pointer; color: #fff; font-size: 22px; position: relative; }
.tab-icon.active { background: #eef4f8; color: #15466e; }
.tab-icon.unread::after { content: ''; position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: #f5d51c; border-radius: 50%; border: 1px solid #000; }

/* Top Presence Bar */
.topbar { background: linear-gradient(to bottom, #f0a13a, #d4730a); padding: 8px 10px; display: flex; align-items: center; gap: 8px; color: #fff; border-bottom: 1px solid #8a4f06; flex-shrink: 0; }
.presence-dot { width: 12px; height: 12px; border-radius: 50%; background: #4ec73f; border: 1px solid rgba(0,0,0,0.2); }
.who { flex: 1; overflow: hidden; line-height: 1.2; }
.who b { font-size: 14px; display: block; white-space: nowrap; text-overflow: ellipsis; }
.who small { font-size: 10px; font-weight: bold; opacity: 0.95; }
.cr-chip { background: rgba(0,0,0,0.2); padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }

/* Content Areas */
.content { flex: 1; overflow-y: auto; background: #fff; -webkit-overflow-scrolling: touch; }
.section-strip { background: #d4d4d4; padding: 6px 10px; font-size: 11px; font-weight: bold; border-bottom: 1px solid #bbb; text-transform: uppercase; color: #333; }
.list-row { display: flex; align-items: center; gap: 12px; padding: 12px 10px; border-bottom: 1px dashed #ccc; cursor: pointer; }

/* Chat Bubbles */

.msg { padding: 6px 10px; border-bottom: 1px dashed #eee; font-size: 13px; line-height: 1.4; word-wrap: break-word; }
.msg.bot { background: #f0f4f7; color: #1c3a55; border-left: 4px solid #2a72a8; font-family: monospace; font-size: 12px; }
.msg.pm { background: #fffde6; border-left: 4px solid #f0a13a; }
.sender { font-weight: bold; margin-right: 5px; }
.av-head { width: 24px; height: 24px; vertical-align: middle; border: 1px solid #ccc; margin-right: 5px; image-rendering: pixelated; background: #fff; }

/* Fixed Input Bar */
.input-area { background: #d8dadb; border-top: 1px solid #bbb; padding: 8px; flex-shrink: 0; }
.game-bar { background: #1c3a55; color: #ffcf6e; padding: 5px; font-size: 11px; text-align: center; font-family: monospace; display: none; }
.input-bar { display: flex; gap: 6px; align-items: center; }
.input-bar input { flex: 1; padding: 10px; border: 1px solid #999; border-radius: 3px; font-size: 14px; background: #fff; }
.input-bar button { padding: 10px 18px; background: linear-gradient(to bottom, #ffd87a, #d97f10); border: 1px solid #7a4f0a; font-weight: bold; border-radius: 3px; color: #5a3300; }

/* Modals */
.modal { position: absolute; bottom: 65px; left: 10px; right: 10px; background: #fff; border: 2px solid #2a72a8; padding: 10px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }

.view { display: none; flex-direction: column; height: 100%; }

function normalizeEmail(email) {

// --- REAL CRICKET ENGINE ---
function autoStart(rid) {
    const wid = Date.now();
    db.ref(`rooms/${rid}/game`).update({ waitStartedAt: wid });
    setTimeout(() => {
        db.ref(`rooms/${rid}/game`).once('value', s => {
            const g = s.val();
            if(g?.waitStartedAt === wid && Object.keys(g.players||{}).length >= 2) {
                const rt = Date.now();
                db.ref(`rooms/${rid}/game`).update({ status:'active', waitStartedAt:null, roundTime:rt, botBowl:Math.floor(Math.random()*6)+1 });
                postBot(rid, "🏏 New Ball! Bat now: !b 1 to 6 (20s)");
                setTimeout(() => resolveCricket(rid, rt), 20000);
            }
        });
    }, 10000);
}

function resolveCricket(rid, time) {
    db.ref(`rooms/${rid}/game`).once('value', snap => {
        const g = snap.val();
        if(!g || g.roundTime !== time) return;
        const players = g.players || {};
        const bowl = g.botBowl;
        let logs = [`[Bot bowled a ${bowl}]`];

        Object.keys(players).forEach(uid => {
            const p = players[uid];
            if(p.status === 'batting') {
                const bat = p.move || Math.floor(Math.random()*6)+1;
                if(bat === bowl) {
                    db.ref(`rooms/${rid}/game/players/${uid}/status`).set('out');
                    logs.push(`🛑 ${p.username} OUT! Runs: ${p.score || 0}`);
                } else {
                    const ns = (p.score || 0) + bat;
                    db.ref(`rooms/${rid}/game/players/${uid}`).update({ score:ns, move:null });
                    logs.push(`🏏 ${p.username} +${bat}`);
                }
            }
        });

        postBot(rid, logs.join(" | "));
        db.ref(`rooms/${rid}/game/players`).once('value', ps => {
            const alive = Object.values(ps.val()||{}).filter(p => p.status === 'batting');
            if(alive.length === 0) {
                const all = Object.values(ps.val()||{});
                all.sort((a,b) => b.score - a.score);
                if(all[0]) postBot(rid, `🏆 Winner: ${all[0].username} with ${all[0].score} runs!`);
                db.ref(`rooms/${rid}/game`).set({ status:'idle', players:null });
            } else {
                db.ref(`rooms/${rid}/game`).update({ status:'idle' });
            }
        });
    });
}
