<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CircleHub - Global Community</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f37021; --p-dark: #d45d1a; --bg: #f0f2f5;
            --white: #ffffff; --grey: #65676b;
            --purple: #9b59b6; --pink: #e75fb3; --red: #e32636; --admin: #e8820c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; outline: none; }
        body { background-color: #000; height: 100vh; overflow: hidden; }
        
        .app-shell { 
            width: 100%; max-width: 500px; margin: 0 auto; height: 100dvh; 
            background: var(--bg); display: flex; flex-direction: column; position: relative; 
        }

        /* Roles & Tags */
        .role-owner, .role-globaladmin { color: var(--admin) !important; font-weight: 900; }
        .role-redmerchant { color: var(--red) !important; font-weight: 800; }
        .role-merchant { color: var(--purple) !important; font-weight: 800; }
        .role-submerchant { color: var(--pink) !important; font-weight: 800; }
        .tag { font-size: 9px; padding: 1px 4px; border-radius: 3px; color: white !important; margin-left: 5px; vertical-align: middle; text-transform: uppercase; }
        .tag-m { background: var(--purple); } .tag-sm { background: var(--pink); } .tag-rm { background: var(--red); } .tag-a { background: #444; }

        /* Header */
        .header { background: linear-gradient(135deg, var(--primary), var(--p-dark)); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; color: white; flex-shrink: 0; }
        .header h1 { font-size: 22px; font-weight: 900; font-style: italic; letter-spacing: -1px; }
        .eco { text-align: right; line-height: 1.1; }
        .eco b { font-size: 13px; display: block; }
        .eco small { font-size: 9px; opacity: 0.9; }

        /* Navigation Views */
        .view { display: none; flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .view.active { display: block; }
        .view.flex-view.active { display: flex; flex-direction: column; height: 100%; padding-bottom: 0; background: #fff; }

        /* Home/Feed Section */
        .post-box { background: white; margin: 10px; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .post-box textarea { width: 100%; height: 60px; border: none; background: #f2f4f7; padding: 10px; border-radius: 10px; resize: none; margin-bottom: 10px; font-size: 14px; }
        .btn-post { width: 100%; padding: 10px; border: none; background: var(--primary); color: white; font-weight: 800; border-radius: 10px; cursor: pointer; }

        .feed-card { background: white; margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid #eee; }
        .feed-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .feed-header img { width: 35px; height: 35px; border-radius: 50%; background: #eee; }

        /* Chat System */
        .room-item { background: white; margin: 8px 12px; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid #eee; }
        .room-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #fdfdfd; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .bubble.sent { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .bubble.received { align-self: flex-start; background: #f0f2f5; border-bottom-left-radius: 2px; }
        .bubble small { display: block; font-size: 10px; font-weight: 800; margin-bottom: 3px; }
        .av-head { width: 20px; height: 20px; vertical-align: middle; border-radius: 3px; margin-right: 5px; }

        .bot-strip { background: #1c3a55; color: #ffcf6e; padding: 6px; font-size: 11px; text-align: center; font-weight: bold; }

        /* Input Area */
        .input-area { padding: 10px 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: center; }
        .input-area input { flex: 1; border: none; background: #f0f2f5; padding: 12px 15px; border-radius: 25px; font-size: 14px; }
        .btn-send { background: var(--primary); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-weight: 900; }

        /* Bottom Nav */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-link { text-align: center; color: #888; font-size: 10px; font-weight: 700; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
        .nav-link span { display: block; font-size: 22px; margin-bottom: 3px; }

        /* Profile & Status */
        .profile-hero { background: white; padding: 25px; text-align: center; border-radius: 0 0 20px 20px; margin-bottom: 10px; }
        .status-badge { background: #fdf2e9; color: var(--primary); padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 800; margin: 10px 0; }
        
        #auth-screen { position: absolute; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .auth-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 16px; }

        /* Level Up Toast */
        #lvl-toast { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); background: #1c3a55; color: #ffcf6e; padding: 20px; border-radius: 15px; border: 3px solid #ffcf6e; z-index: 9999; display: none; text-align: center; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div id="lvl-toast"><h2>LEVEL UP!</h2><p id="lvl-txt"></p></div>

        <!-- Header -->
        <header class="header" id="app-header" style="display:none;">
            <h1 onclick="location.reload()">CircleHub</h1>
            <div class="eco">
                <b>💰 <span id="cr-val">0</span></b>
                <small>रु <span id="npr-val">0.00</span> | $<span id="usd-val">0.00</span></small>
            </div>
        </header>

        <!-- View: Feeds (HOME) -->
        <div id="view-feeds" class="view active">
            <div class="post-box">
                <textarea id="st-input" placeholder="What's your vibe today?"></textarea>
                <button class="btn-post" onclick="postStatus()">Post Status</button>
            </div>
            <div id="feed-container"></div>
        </div>

        <!-- View: Chatroom List (ROOMS) -->
        <div id="view-rooms" class="view">
            <div style="padding: 15px 15px 5px; font-size: 11px; font-weight: 800; color: #888;">OFFICIAL GLOBAL ROOMS</div>
            <div class="room-item" onclick="enterRoom('welcome_zone', 'Welcome Zone 🤝')">
                <div class="room-icon" style="background:#3498db;">🤝</div>
                <div style="flex:1"><b>Welcome Zone</b><br><small>New arrivals meet here</small></div>
            </div>
            <div class="room-item" onclick="enterRoom('vibe_market', 'Vibe Market 🛍️')">
                <div class="room-icon" style="background:#9b59b6;">🛍️</div>
                <div style="flex:1"><b>Vibe Market</b><br><small>Trade Virtual Goods</small></div>
            </div>
            <div class="room-item" onclick="enterRoom('game_central', 'Game Central 🏟️')">
                <div class="room-icon" style="background:#e67e22;">🏟️</div>
                <div style="flex:1"><b>Game Central</b><br><small>Cricket & Arena Games</small></div>
            </div>
        </div>

        <!-- View: Active Chat (CHAT WINDOW) -->
        <div id="view-chat" class="view flex-view">
            <div style="background: white; padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px;">
                <span onclick="changeView('rooms')" style="cursor:pointer; font-weight: 900; font-size: 20px;">←</span>
                <b id="active-room-title">Room</b>
            </div>
            <div id="game-strip" class="bot-strip" style="display:none;"></div>
            <div class="chat-msgs" id="chat-msgs-box"></div>
            <div class="input-area">
                <input type="text" id="m-input" placeholder="Type message or !j...">
                <button class="btn-send" onclick="sendMsg()">➤</button>
            </div>
        </div>

        <!-- View: Profile (ME) -->
        <div id="view-profile" class="view">
            <div class="profile-hero">
                <div style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); margin: 0 auto 10px; overflow: hidden;">
                    <img id="my-av-img" src="" style="width:100%;">
                </div>
                <h2 id="my-name-txt">User</h2>
                <div class="status-badge">HUB LEVEL <span id="my-lvl-txt">1</span></div>
                
                <div style="margin-top: 15px;">
                    <input type="text" id="status-update-input" placeholder="Update your status..." style="width: 80%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px;">
                    <button onclick="updateStatus()" style="padding: 10px 20px; border: none; background: #eee; border-radius: 10px; font-weight: 800; font-size: 12px;">Save Status</button>
                </div>

                <button onclick="logout()" style="margin-top: 30px; padding: 12px 40px; border: none; background: #ffebee; color: #d32f2f; border-radius: 20px; font-weight: 900;">LOGOUT</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" id="app-nav" style="display:none;">
            <div class="nav-link active" onclick="changeView('feeds', this)"><span>🏠</span>Home</div>
            <div class="nav-link" onclick="changeView('rooms', this)"><span>💬</span>Chat</div>
            <div class="nav-link" onclick="changeView('profile', this)"><span>👤</span>Me</div>
        </nav>

        <!-- Auth -->
        <div id="auth-screen">
            <h1 style="font-size: 60px; font-weight: 900; color: var(--primary); font-style: italic; letter-spacing: -4px;">Circle<span>Hub</span></h1>
            <p style="margin-bottom: 40px; font-weight: 700; color: #888;">Nepal's Premier Social Arena</p>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email Address">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
            <button onclick="authAction('login')" style="width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 900; font-size: 16px;">LOG IN</button>
            <p onclick="authAction('signup')" style="margin-top: 25px; color: var(--primary); font-weight: 800; cursor: pointer;">Join CircleHub Free</p>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // --- YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBL4fxOpQcu0otOtCzhq95X-uULIHrTP20",
            authDomain: "buzzr-987ea.firebaseapp.com",
            databaseURL: "https://buzzr-987ea-default-rtdb.firebaseio.com",
            projectId: "buzzr-987ea",
            storageBucket: "buzzr-987ea.firebasestorage.app",
            messagingSenderId: "557198372950",
            appId: "1:557198372950:web:ab3415c2fe09cbf7d34bf7"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let me = null;
        let activeRoom = null;
        const NPR_RATE = 151.39;
        const CR_RATE = 1000;
        let lastLvl = 1;

        // --- SECURITY ---
        function cleanEmail(e) {
            let [u, d] = e.toLowerCase().trim().split('@');
            if (d === 'gmail.com') u = u.split('+')[0].replace(/\./g, '');
            return u + '@' + d;
        }

        // --- AUTH ---
        function authAction(type) {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            if (!e || p.length < 6) return alert("Invalid details.");
            const email = cleanEmail(e);

            if (type === 'login') {
                auth.signInWithEmailAndPassword(email, p).catch(err => alert(err.message));
            } else {
                auth.createUserWithEmailAndPassword(email, p).then(res => {
                    db.ref('users').once('value', s => {
                        const isFirst = !s.exists();
                        db.ref('users/' + res.user.uid).set({
                            username: email.split('@')[0], credits: isFirst ? 100000 : 500,
                            xp: 0, role: isFirst ? 'owner' : 'member', av: Math.floor(Math.random() * 800), statusMsg: "Hello CircleHub!"
                        });
                        db.ref('usernames/' + email.split('@')[0].toLowerCase()).set(res.user.uid);
                    });
                }).catch(err => alert(err.message));
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-header').style.display = 'flex';
                document.getElementById('app-nav').style.display = 'flex';
                db.ref('users/' + user.uid).on('value', snap => {
                    me = snap.val(); me.uid = user.uid;
                    updateUI();
                });
                loadFeeds();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        });

        function getLevel(xp) { return Math.floor(Math.sqrt((xp || 0) / 50)) + 1; }

        function updateUI() {
            if (!me) return;
            const usd = me.credits / CR_RATE;
            document.getElementById('cr-val').innerText = Math.floor(me.credits).toLocaleString();
            document.getElementById('usd-val').innerText = usd.toFixed(2);
            document.getElementById('npr-val').innerText = (usd * NPR_RATE).toFixed(2);
            document.getElementById('my-name-txt').innerText = me.username;
            document.getElementById('my-name-txt').className = 'role-' + me.role;
            const lvl = getLevel(me.xp);
            document.getElementById('my-lvl-txt').innerText = lvl;
            document.getElementById('my-av-img').src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${me.av}&backgroundColor=b6e3f4`;
            
            if (lvl > lastLvl) {
                document.getElementById('lvl-toast').style.display = 'block';
                document.getElementById('lvl-txt').innerText = `Reached Level ${lvl}!`;
                setTimeout(() => document.getElementById('lvl-toast').style.display = 'none', 4000);
                lastLvl = lvl;
            }
        }

        // --- FEED/POST SYSTEM ---
        function postStatus() {
            const t = document.getElementById('st-input').value;
            if (!t) return;
            db.ref('feeds').push({
                uid: me.uid, name: me.username, text: t, av: me.av, role: me.role, xp: me.xp, time: Date.now()
            });
            document.getElementById('st-input').value = "";
        }

        function loadFeeds() {
            db.ref('feeds').limitToLast(15).on('value', snap => {
                const cont = document.getElementById('feed-container');
                cont.innerHTML = "";
                snap.forEach(p => {
                    const d = p.val();
                    cont.innerHTML += `<div class="feed-card">
                        <div class="feed-header">
                            <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${d.av}">
                            <b class="role-${d.role}">${d.name} [${getLevel(d.xp || 0)}]</b>
                        </div>
                        <div style="font-size:14px; line-height:1.5;">${d.text}</div>
                    </div>`;
                });
            });
        }

        // --- CHAT SYSTEM ---
        function enterRoom(id, title) {
            activeRoom = id;
            document.getElementById('active-room-title').innerText = title;
            changeView('chat');
            db.ref(`messages/${id}`).limitToLast(40).on('value', s => {
                const box = document.getElementById('chat-msgs-box'); box.innerHTML = "";
                s.forEach(m => {
                    const d = m.val();
                    if (d.uid === 'BOT') box.innerHTML += `<div class="bot-strip">${d.text}</div>`;
                    else {
                        const isMe = d.uid === me.uid;
                        box.innerHTML += `<div class="bubble ${isMe ? 'sent' : 'received'}">
                            <small class="role-${d.role}"><img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${d.av}" class="av-head">${d.name} [${getLevel(d.xp || 0)}]</small>
                            ${d.text}
                        </div>`;
                    }
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function sendMsg() {
            const inp = document.getElementById('m-input');
            const t = inp.value.trim(); if (!t || !activeRoom) return;
            inp.value = "";

            if (t === "!j") {
                db.ref(`arenas/cricket/players/${me.uid}`).set({ name: me.username, status: 'batting', score: 0 });
                return db.ref(`messages/${activeRoom}`).push({ uid:'BOT', text: `${me.username} joined the match!` });
            }

            db.ref(`messages/${activeRoom}`).push({ uid: me.uid, name: me.username, text: t, av: me.av, role: me.role, xp: me.xp, time: Date.now() });
            db.ref(`users/${me.uid}/xp`).set(firebase.database.ServerValue.increment(0.5));
        }

        // --- PROFILE/STATUS ---
        function updateStatus() {
            const s = document.getElementById('status-update-input').value;
            if (!s) return;
            db.ref(`users/${me.uid}`).update({ statusMsg: s });
            alert("Status Updated!");
        }

        // --- NAVIGATION ---
        function changeView(vid, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + vid).classList.add('active');
            if (el) { document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active')); el.classList.add('active'); }
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
